        <option value="all" ${STATE.stockFilterStatut==='all'?'selected':''}>Tous statuts</option>
        <option value="zero" ${STATE.stockFilterStatut==='zero'?'selected':''}>Rupture</option>
        <option value="low" ${STATE.stockFilterStatut==='low'?'selected':''}>Bas stock</option>
        <option value="ok" ${STATE.stockFilterStatut==='ok'?'selected':''}>OK</option>
      </select>

}

function renderLogistics() {
  const evts = getLogisticsEvents();
  const urgent = evts.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=5; });
  const later = evts.filter(e => daysUntil(e.date) > 5);

  const activeMissions = MISSIONS.filter(m=>mStatus(m)==='active');
  const upcomingMissions = MISSIONS.filter(m=>mStatus(m)==='upcoming').sort((a,b)=>new Date(a.debut)-new Date(b.debut));
  const allRelevant = [...activeMissions, ...upcomingMissions.slice(0,8)];
  const sba = getStockByAsso();
  const relevantAssos = [...new Set(allRelevant.map(m=>m.asso))];

  let croiseHtml = relevantAssos.map(asso => {
    const c = ac(asso);
    const ms = allRelevant.filter(m=>m.asso===asso);
    const stockTotal = (sba[asso]||{}).total||0;
    const alerts = (sba[asso]||{}).alerts||0;
    const missions = ms.map(m=>`<span class="croise-mission-tag" onclick="openMission(${m.id})" style="cursor:pointer;background:${mStatus(m)==='active'?c.l:'rgba(255,255,255,0.06)'};color:${mStatus(m)==='active'?c.p:'var(--muted)'}">${m.lieu} ${mStatus(m)==='active'?'→':''} ${fmtDate(mStatus(m)==='active'?m.fin:m.debut)}</span>`).join('');
    return `<div class="croise-row">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        ${assoAvatar(asso,32)}
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${asso}</div><div style="font-size:10px;color:var(--muted)">${ms.length} mission(s)</div></div>
        <div style="text-align:right">
          <div class="${stockTotal<10?'stock-zero':stockTotal<30?'stock-low':'stock-ok'}" style="font-size:18px">${stockTotal}</div>
          ${alerts>0?`<div style="font-size:10px;color:#f87171">⚠ ${alerts}</div>`:''}
        </div>
      </div>
      <div class="croise-missions">${missions}</div>
    </div>`;
  }).join('');

  return `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val" style="color:#f87171">${urgent.length}</div><div class="kpi-label">Actions urgentes</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:#60a5fa">${evts.length}</div><div class="kpi-label">Total à planifier</div></div>
    </div>

    <div class="info-box">
      <strong>Règles logistiques DLR</strong><br>
      ↗ Envoi matériel : <strong>J−5</strong> avant le début de mission<br>
      ↩ Retour matériel : <strong>J−3/4</strong> avant la fin de mission
    </div>

    ${(() => {
      const overdue = getOverdueMissions();
      if (!overdue.length) return '';
      return `<div class="card" style="border-color:#ef444455;background:#2a0a0a">
        <div class="card-title" style="color:#f87171">🔴 Retours en retard — J+7 dépassé (${overdue.length})</div>
        ${overdue.map(m => {
          const retourStatus = getRetourStatus(m);
          return `<div class="alert-overdue-row" style="padding:8px 0;border-bottom:1px solid rgba(239,68,68,0.15);cursor:default">
            <div style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer" onclick="openMission(${m.id})">
              ${assoAvatar(m.asso, 30)}
              <div>
                <div style="font-size:13px;font-weight:700">${m.asso} — ${m.lieu}</div>
                <div style="font-size:10px;color:var(--muted)">RE : ${m.re||'?'} · Fin : ${fmtDate(m.fin)} · Limite retour : ${fmtDate(m.deadline)}</div>
                ${retourStatus.partial ? `<div style="font-size:10px;color:#fbbf24;margin-top:2px">⚠ Retour partiel : ${retourStatus.rendus}/${retourStatus.total} envoi(s)</div>` : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <div class="overdue-days">+${m.daysLate}j</div>
              ${retourStatus.allRendu
                ? `<span style="font-size:10px;color:#34d399;font-weight:800;background:rgba(52,211,153,.15);padding:2px 8px;border-radius:20px">✓ Rendu</span>`
                : `<button onclick="markAllRendu(${m.id});event.stopPropagation()" style="background:#34d399;border:none;border-radius:8px;color:#000;font-size:11px;font-weight:800;padding:5px 10px;cursor:pointer;white-space:nowrap">✓ Rendu</button>`}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    })()}

    ${urgent.length ? `<div class="card">
      <div class="card-title">⚡ Actions dans les 5 jours (${urgent.length})</div>
      ${urgent.map(e=>renderLogRow(e,true)).join('')}
    </div>` : ''}

    ${later.length ? `<div class="card">
      <div class="card-title">📋 Prochains événements</div>
      ${later.slice(0,14).map(e=>renderLogRow(e)).join('')}
    </div>` : ''}

    <div class="card">
      <div class="card-title">📊 Statut par association</div>
      ${croiseHtml}
    </div>`;
}

// ─── NEW ACTIONS ─────────────────────────────────────────────────────────────
function addTabletteAction() {
  const nom = STATE.addTabForm.nom.trim();
  const serie = STATE.addTabForm.serie.trim();

  // ── Validation nom ──────────────────────────────────────────────
  if (!nom) { showAlert("Le nom est requis (ex: DLR 85)", {icon:'📛', title:'Champ requis'}); return; }

  // Nom : uniquement lettres, chiffres, espaces et tirets — pas de parenthèses, virgules, etc.
  if (!/^[A-Za-z0-9 \-]+$/.test(nom)) {
    showAlert("Nom invalide : utilisez uniquement des lettres, chiffres, espaces et tirets.\n(Caractères interdits : " + nom.replace(/[A-Za-z0-9 \-]/g,'') + ")", {icon:'🚫', title:'Nom invalide'}); return;
  }

  // Nom unique (insensible à la casse)
  if (TABLETTES.find(t => t.nom.toLowerCase() === nom.toLowerCase())) {
    showAlert("Une tablette nommée « " + nom + " » existe déjà.\nVérifiez les doublons dans la liste.", {icon:'🔁', title:'Nom déjà utilisé'}); return;
  }

  // ── Validation numéro de série ──────────────────────────────────
  if (serie) {
    // Format attendu : 12 caractères alphanumériques majuscules
    if (!/^[A-Z0-9]{10,14}$/.test(serie)) {
      showAlert("Numéro de série invalide.\nFormat attendu : 10–14 caractères alphanumériques majuscules (ex: F9FX8395JF8J)", {icon:'🔢', title:'Série invalide'}); return;
    }
    // Numéro de série unique
    const serieExistante = TABLETTES.find(t => t.serie && t.serie.toUpperCase() === serie.toUpperCase());
    if (serieExistante) {
      showAlert("Ce numéro de série est déjà enregistré pour la tablette « " + serieExistante.nom + " ».\nVérifiez qu'il ne s'agit pas d'un doublon.", {icon:'🔁', title:'Série déjà enregistrée'}); return;
    }
  }

  // ── Insertion ───────────────────────────────────────────────────
  TABLETTES.push({nom, serie, ios:STATE.addTabForm.ios.trim(), modele:STATE.addTabForm.modele.trim()||"iPad 6", etat:STATE.addTabForm.etat, note:STATE.addTabForm.note.trim()||undefined});
  STATE.addTabForm = {nom:"", serie:"", ios:"", modele:"iPad 6", etat:"ok", note:""};
  STATE.showAddTab = false;
  render();
}

    }).then(ok => {

function adjustStock(asso, materiel, taille, delta, note) {
  let si = STOCK.findIndex(s=>s.asso===asso && s.materiel===materiel && s.taille===taille);
  if (si===-1) si = STOCK.findIndex(s=>s.asso===asso && s.materiel===materiel && !s.taille);
  if (si===-1) return false;
  const before = STOCK[si].qty;
  const after = Math.max(0, before + delta);
  STOCK[si].qty = after;
  STATE.mvtLog.unshift({date:new Date().toLocaleString('fr-FR'),asso,materiel,taille:taille||'–',type:delta<0?'sortie':'entree',qty:Math.abs(delta),note,before,after});
  return true;
}

function addLigneVetEnvoi() {
  const lf = STATE.envoiLigneForm;
  const type = document.getElementById('ef-ligne-type')?.value || lf.type_vetement;
  const taille = document.getElementById('ef-ligne-taille')?.value || lf.taille;
  const nb = parseInt(document.getElementById('ef-ligne-nb')?.value) || lf.nb_vetements || 1;
  if (!type || !taille || nb <= 0) { showAlert('Sélectionnez un type, une taille et une quantité valide', {icon:'📦', title:'Champs manquants'}); return; }
  if (!STATE.envoiForm.lignes_vetements) STATE.envoiForm.lignes_vetements = [];
  // Si même type+taille existe déjà, on cumule
  const existing = STATE.envoiForm.lignes_vetements.find(l=>l.type===type && l.taille===taille);
  if (existing) existing.nb += nb;
  else STATE.envoiForm.lignes_vetements.push({type, taille, nb});
  STATE.envoiLigneForm = {type_vetement:'', taille:'', nb_vetements:1};
  render();
}

function removeLigneVetEnvoi(idx) {

function addEnvoi(mId) {
  const idx = MISSIONS.findIndex(m=>m.id===mId);
  if (idx===-1) return;
  const m = MISSIONS[idx];
  const lignesVet = STATE.envoiForm.lignes_vetements || [];
  const nbKak = parseInt(document.getElementById('ef-nbkak').value)||0;
  const nbCpt = parseInt(document.getElementById('ef-nbcpt').value)||0;
  const nbChargeurs = parseInt(document.getElementById('ef-nbchargeurs').value)||0;
  const tabNoms = STATE.envoiForm.tablettes_noms || [];
  const nbTab = tabNoms.length;
  // Décrémenter le stock pour chaque ligne vêtement
  lignesVet.forEach(l => {
    if (l.nb > 0) adjustStock(m.asso, l.type, l.taille, -l.nb, `Envoi → ${m.lieu}`);
  });
  if (nbKak > 0) adjustStock(m.asso, 'Kakémono', null, -nbKak, `Envoi → ${m.lieu}`);
  if (nbCpt > 0) adjustStock(m.asso, 'Comptoir', null, -nbCpt, `Envoi → ${m.lieu}`);
  // Marquer les tablettes comme "en mission"
  tabNoms.forEach(nom => {
    const ti = TABLETTES.findIndex(t=>t.nom===nom);
    if (ti!==-1) {
      TABLETTES[ti].etat = 'mission';
      TABLETTES[ti].missionLieu = m.lieu;
      TABLETTES[ti].missionId = m.id;
      TABLETTES[ti].missionAsso = m.asso;
    }
  });
  const totalVet = lignesVet.reduce((a,l)=>a+l.nb,0);
  const envoi = {
    date: new Date().toLocaleDateString('fr-FR'),
    lignes_vetements: [...lignesVet],
    // Rétrocompat lecture ancienne
    type_vetement: lignesVet.length === 1 ? lignesVet[0].type : (lignesVet.length > 1 ? 'Multi' : ''),
    taille: lignesVet.length === 1 ? lignesVet[0].taille : '',
    nb_vetements: totalVet,
    nb_tablettes: nbTab,
    nb_kakemonos: nbKak,
    nb_comptoirs: nbCpt,
    nb_chargeurs: nbChargeurs,
    tablettes_noms: [...tabNoms]
  };
  if (!MISSIONS[idx].materielEnvoye) MISSIONS[idx].materielEnvoye = [];
  MISSIONS[idx].materielEnvoye.push(envoi);
  STATE.showEnvoiForm[mId] = false;
  STATE.envoiForm = {lignes_vetements:[], nb_tablettes:0, nb_kakemonos:0, nb_comptoirs:0, nb_chargeurs:0, tablettes_noms:[]};
  STATE.envoiLigneForm = {type_vetement:'', taille:'', nb_vetements:1};
  STATE.selectedMission = MISSIONS[idx];
  render();
}

function removeEnvoi(mId, envoiIdx) {
  const mi = MISSIONS.findIndex(m=>m.id===mId);
  if (mi===-1) return;
  const m = MISSIONS[mi];
  const envoi = m.materielEnvoye[envoiIdx];
  const clKey = `envoi_${envoiIdx}`;
  const dejaSRendu = m.checklist && m.checklist[clKey+'_rendu'];
  // Si pas encore rendu, on remet le stock matériel + tablettes
  if (!dejaSRendu && envoi) {
    // Multi-lignes vêtements
    const lgv = envoi.lignes_vetements || (envoi.type_vetement && envoi.nb_vetements ? [{type:envoi.type_vetement,taille:envoi.taille,nb:envoi.nb_vetements}] : []);
    lgv.forEach(l => { if (l.nb > 0) adjustStock(m.asso, l.type, l.taille, l.nb, `Annulation envoi ← ${m.lieu}`); });
    if (envoi.nb_kakemonos > 0)
      adjustStock(m.asso, 'Kakémono', null, envoi.nb_kakemonos, `Annulation envoi ← ${m.lieu}`);
    if (envoi.nb_comptoirs > 0)
      adjustStock(m.asso, 'Comptoir', null, envoi.nb_comptoirs, `Annulation envoi ← ${m.lieu}`);
    // Remettre les tablettes à OK
    if (envoi.tablettes_noms && envoi.tablettes_noms.length) {
      envoi.tablettes_noms.forEach(nom => {
        const ti = TABLETTES.findIndex(t=>t.nom===nom);
        if (ti!==-1) {
          TABLETTES[ti].etat = 'ok';
          delete TABLETTES[ti].missionLieu;
          delete TABLETTES[ti].missionId;
        }
      });
    }
  }
  m.materielEnvoye.splice(envoiIdx, 1);
  STATE.selectedMission = m;
  render();
}

function toggleCheck(mId, key, val) {
  const idx = MISSIONS.findIndex(m=>m.id===mId);
  if (idx===-1) return;
  const m = MISSIONS[idx];
  if (!m.checklist) m.checklist = {};
  m.checklist[key] = val;
  STATE.selectedMission = m;

  // Si c'est une case "rendu OK", on ajuste le stock matériel + tablettes
  if (key.endsWith('_rendu')) {
    const envoiIdx = parseInt(key.replace('envoi_','').replace('_rendu',''));
    const envoi = m.materielEnvoye && m.materielEnvoye[envoiIdx];
    if (envoi) {
      const delta = val ? +1 : -1;
      // Multi-lignes vêtements
      const lgv = envoi.lignes_vetements || (envoi.type_vetement && envoi.nb_vetements ? [{type:envoi.type_vetement,taille:envoi.taille,nb:envoi.nb_vetements}] : []);
      lgv.forEach(l => { if (l.nb > 0) adjustStock(m.asso, l.type, l.taille, delta * l.nb, `Retour ${val?'OK':'annulé'} ← ${m.lieu}`); });
      if (envoi.nb_kakemonos > 0)
        adjustStock(m.asso, 'Kakémono', null, delta * envoi.nb_kakemonos, `Retour ${val?'OK':'annulé'} ← ${m.lieu}`);
      if (envoi.nb_comptoirs > 0)
        adjustStock(m.asso, 'Comptoir', null, delta * envoi.nb_comptoirs, `Retour ${val?'OK':'annulé'} ← ${m.lieu}`);
      // Tablettes : retour → etat 'ok', annulation retour → etat 'mission'
      if (envoi.tablettes_noms && envoi.tablettes_noms.length) {
        envoi.tablettes_noms.forEach(nom => {
          const ti = TABLETTES.findIndex(t=>t.nom===nom);
          if (ti!==-1) {
            if (val) {
              TABLETTES[ti].etat = 'ok';
              delete TABLETTES[ti].missionLieu;
              delete TABLETTES[ti].missionId;
            } else {
              TABLETTES[ti].etat = 'mission';
              TABLETTES[ti].missionLieu = m.lieu;
              TABLETTES[ti].missionId = m.id;
            }
          }
        });
      }
      render();
    }
  }
}

// ─── RETOUR HELPERS ──────────────────────────────────────────────────────────

function getRetourStatus(m) {
  const envois = m.materielEnvoye || [];
  if (envois.length === 0) return { allRendu: false, partial: false, rendus: 0, total: 0 };
  const checklist = m.checklist || {};
  let rendus = 0;
  for (let i = 0; i < envois.length; i++) {
    const rpKey = `${m.id}_${i}`;
    const rp = STATE.retourPartiel[rpKey] || {};
    const e = envois[i];
    const totalVet = e.nb_vetements || 0;
    const totalTab = e.nb_tablettes || 0;
    const totalKak = e.nb_kakemonos || 0;
    const totalCpt = e.nb_comptoirs || 0;
    const totalChg = e.nb_chargeurs || 0;
    const totalItems = totalVet + totalTab + totalKak + totalCpt + totalChg;
    const retVetRp = rp.lignes_vetements && rp.lignes_vetements.length > 0
      ? rp.lignes_vetements.reduce((a,l)=>a+(l.rendu||0),0)
      : (rp.vetements !== undefined ? rp.vetements : null);
    const retVet = retVetRp !== null ? retVetRp : (checklist[`envoi_${i}_rendu`] ? totalVet : 0);
    const retTab = rp.tablettes !== undefined ? rp.tablettes.length : (checklist[`envoi_${i}_rendu`] ? totalTab : 0);
    const retKak = rp.kakemonos !== undefined ? rp.kakemonos : (checklist[`envoi_${i}_rendu`] ? totalKak : 0);
    const retCpt = rp.comptoirs !== undefined ? rp.comptoirs : (checklist[`envoi_${i}_rendu`] ? totalCpt : 0);
    const retChg = rp.chargeurs !== undefined ? rp.chargeurs : (checklist[`envoi_${i}_rendu`] ? totalChg : 0);
    const totalRendu = retVet + retTab + retKak + retCpt + retChg;
    if (totalRendu >= totalItems && totalItems > 0) rendus++;
    else if (checklist[`envoi_${i}_rendu`]) rendus++;
  }
  const allRendu = rendus >= envois.length;
  const partial = rendus > 0 && rendus < envois.length;
  return { allRendu, partial, rendus, total: envois.length };
}

function markAllRendu(mId) {
  const idx = MISSIONS.findIndex(m=>m.id===mId);
  if (idx===-1) return;
  const m = MISSIONS[idx];
  if (!m.checklist) m.checklist = {};
  (m.materielEnvoye||[]).forEach((e, i) => {
    if (!m.checklist[`envoi_${i}_rendu`]) {
      m.checklist[`envoi_${i}_rendu`] = true;
      // Ajuster le stock
      const lgv = e.lignes_vetements || (e.type_vetement && e.nb_vetements ? [{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}] : []);
      lgv.forEach(l => { if (l.nb > 0) adjustStock(m.asso, l.type, l.taille, l.nb, `Retour OK ← ${m.lieu}`); });
      if (e.nb_kakemonos > 0)
        adjustStock(m.asso, 'Kakémono', null, e.nb_kakemonos, `Retour OK ← ${m.lieu}`);
      if (e.nb_comptoirs > 0)
        adjustStock(m.asso, 'Comptoir', null, e.nb_comptoirs, `Retour OK ← ${m.lieu}`);
      if (e.tablettes_noms && e.tablettes_noms.length) {
        e.tablettes_noms.forEach(nom => {
          const ti = TABLETTES.findIndex(t=>t.nom===nom);
          if (ti!==-1) { TABLETTES[ti].etat = 'ok'; delete TABLETTES[ti].missionLieu; delete TABLETTES[ti].missionId; }
        });
      }
    }
  });
  STATE.selectedMission = m;
  render();
}

function setRetourPartielVet(mId, envoiIdx, val) {

  STATE.retourPartiel[key].vetements = val;
}

function adjustLigneRetour(mId, envoiIdx, type, taille, maxNb, delta) {
  const key = `${mId}_${envoiIdx}`;
  if (!STATE.retourPartiel[key]) STATE.retourPartiel[key] = {};
  if (!STATE.retourPartiel[key].lignes_vetements) {
    const m = MISSIONS.find(m=>m.id===mId);
    const e = m && m.materielEnvoye[envoiIdx];
    const lgv = e ? (e.lignes_vetements || (e.type_vetement&&e.nb_vetements?[{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}]:[])) : [];
    STATE.retourPartiel[key].lignes_vetements = lgv.map(l=>({type:l.type, taille:l.taille, rendu:0}));
  }
  const ligne = STATE.retourPartiel[key].lignes_vetements.find(l=>l.type===type&&l.taille===taille);
  if (ligne) { ligne.rendu = Math.max(0, Math.min(maxNb, ligne.rendu + delta)); }
  else STATE.retourPartiel[key].lignes_vetements.push({type, taille, rendu: Math.max(0,Math.min(maxNb,delta))});
  render();
}

function adjustKakRetour(mId, envoiIdx, delta, max) {
  const key = `${mId}_${envoiIdx}`;
  if (!STATE.retourPartiel[key]) STATE.retourPartiel[key] = {};
  const m = MISSIONS.find(m=>m.id===mId);
  const e = m && m.materielEnvoye[envoiIdx];
  const maxVal = max !== undefined ? max : (e ? (e.nb_kakemonos||0) : 0);
  const cur = STATE.retourPartiel[key].kakemonos !== undefined ? STATE.retourPartiel[key].kakemonos : 0;
  STATE.retourPartiel[key].kakemonos = Math.max(0, Math.min(maxVal, cur + delta));
  render();
}

function adjustCptRetour(mId, envoiIdx, delta, max) {
  const key = `${mId}_${envoiIdx}`;
  if (!STATE.retourPartiel[key]) STATE.retourPartiel[key] = {};
  const m = MISSIONS.find(m=>m.id===mId);
  const e = m && m.materielEnvoye[envoiIdx];
  const maxVal = max !== undefined ? max : (e ? (e.nb_comptoirs||0) : 0);
  const cur = STATE.retourPartiel[key].comptoirs !== undefined ? STATE.retourPartiel[key].comptoirs : 0;
  STATE.retourPartiel[key].comptoirs = Math.max(0, Math.min(maxVal, cur + delta));

}

function setAllLigneRetour(mId, envoiIdx, type, taille, nb) {
  const key = `${mId}_${envoiIdx}`;
  if (!STATE.retourPartiel[key]) STATE.retourPartiel[key] = {};
  if (!STATE.retourPartiel[key].lignes_vetements) {
    const m = MISSIONS.find(m=>m.id===mId);
    const e = m && m.materielEnvoye[envoiIdx];
    const lgv = e ? (e.lignes_vetements || (e.type_vetement&&e.nb_vetements?[{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}]:[])) : [];
    STATE.retourPartiel[key].lignes_vetements = lgv.map(l=>({type:l.type, taille:l.taille, rendu:0}));
  }

  if (ligne) { ligne.rendu = nb; }
  else STATE.retourPartiel[key].lignes_vetements.push({type, taille, rendu:nb});

}

function cloturerMission(mId) {
  const idx = MISSIONS.findIndex(m=>m.id===mId);
  if (idx===-1) return;
  const m = MISSIONS[idx];
  const cf = STATE.clotureForm[mId] || {motif:'perdu', note:''};
  if (!m.checklist) m.checklist = {};

  // Collecter les articles manquants et créditer le stock pour ce qui a été rendu
  const manquants = [];
  (m.materielEnvoye||[]).forEach((e, i2) => {
    const rpKey2 = `${mId}_${i2}`;
    const rp2 = STATE.retourPartiel[rpKey2] || {};
    const alreadyRendu = m.checklist[`envoi_${i2}_rendu`];
    if (alreadyRendu) return; // déjà traité

    const lgv2 = e.lignes_vetements || (e.type_vetement&&e.nb_vetements?[{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}]:[]);

    // Vêtements ligne par ligne
    lgv2.forEach(l => {
      const rpLigne = (rp2.lignes_vetements||[]).find(x=>x.type===l.type&&x.taille===l.taille);
      const renduLigne = rpLigne ? rpLigne.rendu : (rp2.vetements !== undefined ? Math.round(rp2.vetements * l.nb / lgv2.reduce((a,x)=>a+x.nb,0)) : 0);
      const manqNb = l.nb - renduLigne;
      if (renduLigne > 0) adjustStock(m.asso, l.type, l.taille, renduLigne, `Clôture mission ← ${m.lieu}`);
      if (manqNb > 0) manquants.push({type:l.type, taille:l.taille, nb:manqNb, motif:cf.motif});
    });

    // Kakémonos
    const tk = e.nb_kakemonos||0;
    const rk = rp2.kakemonos||0;
    if (rk > 0) adjustStock(m.asso, 'Kakémono', null, rk, `Clôture mission ← ${m.lieu}`);
    if (tk - rk > 0) manquants.push({type:'Kakémono', taille:null, nb:tk-rk, motif:cf.motif});

    // Comptoirs
    const tc = e.nb_comptoirs||0;
    const rc = rp2.comptoirs||0;
    if (rc > 0) adjustStock(m.asso, 'Comptoir', null, rc, `Clôture mission ← ${m.lieu}`);
    if (tc - rc > 0) manquants.push({type:'Comptoir', taille:null, nb:tc-rc, motif:cf.motif});

    // Chargeurs
    const tch = e.nb_chargeurs||0;
    const rch = rp2.chargeurs||0;
    if (tch - rch > 0) manquants.push({type:'Chargeur', taille:null, nb:tch-rch, motif:cf.motif});

    // Tablettes : marquer retournées celles cochées, garder les autres en 'ok' si perdues
    const tabsEnvoyees = e.tablettes_noms || [];
    const retTabNoms = rp2.tablettes || [];
    tabsEnvoyees.forEach(nom => {
      const ti = TABLETTES.findIndex(t=>t.nom===nom);
      if (retTabNoms.includes(nom)) {
        if (ti!==-1) { TABLETTES[ti].etat='ok'; delete TABLETTES[ti].missionLieu; delete TABLETTES[ti].missionId; }
      } else {
        // Non rendu → marquer comme hs si perdu/abime
        if (ti!==-1) {
          TABLETTES[ti].etat = cf.motif === 'abime' ? 'hs' : 'ok';
          TABLETTES[ti].note = `${cf.motif==='perdu'?'Perdue':cf.motif==='abime'?'Abîmée':'Non rendue'} — mission ${m.lieu}`;
          delete TABLETTES[ti].missionLieu; delete TABLETTES[ti].missionId;
        }
        manquants.push({type:'Tablette', taille:nom, nb:1, motif:cf.motif});
      }
    });

    // Marquer l'envoi comme rendu (pour ne pas re-traiter)
    m.checklist[`envoi_${i2}_rendu`] = true;
  });

  m.checklist.mission_cloturee = true;
  m.checklist.cloture_date = new Date().toLocaleString('fr-FR');
  m.checklist.cloture_note = cf.note || '';
  m.checklist.cloture_manquants = manquants;

  STATE.showClotureForm[mId] = false;
  STATE.selectedMission = m;
  render();
}

  const m = MISSIONS.find(m=>m.id===mId);

function validerRetourPartiel(mId, envoiIdx) {
  const idx = MISSIONS.findIndex(m=>m.id===mId);
  if (idx===-1) return;
  const m = MISSIONS[idx];
  const e = m.materielEnvoye[envoiIdx];
  const rpKey = `${mId}_${envoiIdx}`;
  const rp = STATE.retourPartiel[rpKey] || {};

  const lgv = e.lignes_vetements || (e.type_vetement && e.nb_vetements ? [{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}] : []);
  const totalVet = lgv.reduce((a,l)=>a+l.nb, 0);
  const totalTab = e.nb_tablettes || 0;
  const totalKak = e.nb_kakemonos || 0;
  const totalCpt = e.nb_comptoirs || 0;
  const totalChg = e.nb_chargeurs || 0;

  let retVet = 0;
  if (rp.lignes_vetements && rp.lignes_vetements.length > 0) {
    retVet = rp.lignes_vetements.reduce((a,l)=>a+(l.rendu||0), 0);
  } else if (rp.vetements !== undefined) {
    retVet = rp.vetements;
  }
  const retTabNoms = rp.tablettes || [];
  const retTab = retTabNoms.length;
  const retKak = rp.kakemonos !== undefined ? rp.kakemonos : 0;
  const retCpt = rp.comptoirs !== undefined ? rp.comptoirs : 0;
  const retChg = rp.chargeurs !== undefined ? rp.chargeurs : 0;

  // Ajuster le stock vêtements LIGNE PAR LIGNE (précis)
  if (lgv.length > 0) {
    if (rp.lignes_vetements && rp.lignes_vetements.length > 0) {
      // Utiliser les données ligne par ligne
      rp.lignes_vetements.forEach(rpLigne => {
        if (rpLigne.rendu > 0) {
          adjustStock(m.asso, rpLigne.type, rpLigne.taille, rpLigne.rendu, `Retour partiel ← ${m.lieu}`);
        }
      });
    } else if (retVet > 0) {
      // Fallback: répartir proportionnellement
      let remaining = retVet;
      lgv.forEach((l, li) => {
        const share = li === lgv.length - 1 ? remaining : Math.round(retVet * l.nb / totalVet);
        if (share > 0) adjustStock(m.asso, l.type, l.taille, share, `Retour partiel ← ${m.lieu}`);
        remaining -= share;
      });
    }
  }
  if (retKak > 0)
    adjustStock(m.asso, 'Kakémono', null, retKak, `Retour partiel ← ${m.lieu}`);
  if (retCpt > 0)
    adjustStock(m.asso, 'Comptoir', null, retCpt, `Retour partiel ← ${m.lieu}`);
  retTabNoms.forEach(nom => {
    const ti = TABLETTES.findIndex(t=>t.nom===nom);
    if (ti!==-1) { TABLETTES[ti].etat = 'ok'; delete TABLETTES[ti].missionLieu; delete TABLETTES[ti].missionId; }
  });

  const totalRendu = retVet + retTab + retKak + retCpt + retChg;
  const totalItems = totalVet + totalTab + totalKak + totalCpt + totalChg;

  // Si tout est rendu, marquer comme rendu complet
  if (totalRendu >= totalItems && totalItems > 0) {
    if (!m.checklist) m.checklist = {};
    m.checklist[`envoi_${envoiIdx}_rendu`] = true;
  }

  STATE.showRetourPartiel[rpKey] = false;
  STATE.selectedMission = m;
  render();
}

function doMvt() {
  const asso = document.getElementById('mvt-asso').value;
  const mat = document.getElementById('mvt-mat').value;
  const taille = document.getElementById('mvt-taille').value;
  const type = document.getElementById('mvt-type').value;
  const qty = parseInt(document.getElementById('mvt-qty').value)||1;
  const note = document.getElementById('mvt-note').value;
  if (!asso || !mat) { showAlert('Association et matériel requis', {icon:'📦', title:'Champs manquants'}); return; }
  const idx = STOCK.findIndex(s => s.asso===asso && s.materiel===mat && s.taille===taille);
  if (idx === -1) { showAlert('Article introuvable dans le stock', {icon:'🔍', title:'Article introuvable'}); return; }
  const delta = type === 'entree' ? qty : -qty;
  const newQty = STOCK[idx].qty + delta;
  if (newQty < 0) { showAlert('Stock insuffisant ('+STOCK[idx].qty+' disponibles)', {icon:'⚠️', title:'Stock insuffisant'}); return; }
  const before = STOCK[idx].qty;
  STOCK[idx] = { ...STOCK[idx], qty: newQty };
  STATE.mvtLog.unshift({ date: new Date().toLocaleString('fr-FR'), asso, materiel:mat, taille, type, qty, note, before, after: newQty });
  STATE.mvtForm = { asso:'', materiel:'', taille:'', type:'sortie', qty:1, note:'' };

function addStockItem() {
  const f = STATE.addStockForm;
  if (!f.asso || !f.materiel) { showAlert('Association et matériel requis', {icon:'📦', title:'Champs manquants'}); return; }
  const taille = f.taille || null;
  const exists = STOCK.find(s=>s.asso===f.asso && s.materiel===f.materiel && s.taille===taille);
  if (exists) {
    const before = exists.qty;
    exists.qty += parseInt(f.qty)||0;
    STATE.mvtLog.unshift({date:new Date().toLocaleString('fr-FR'),asso:f.asso,materiel:f.materiel,taille,type:'entree',qty:parseInt(f.qty)||0,note:'Ajout stock',before,after:exists.qty});
  } else {
    const newId = Math.max(...STOCK.map(s=>s.id)) + 1;
    STOCK.push({id:newId, asso:f.asso, materiel:f.materiel, taille, qty:parseInt(f.qty)||0});
    // Trier pour que le nouvel article se place avec les articles du même type
    const TAILLE_ORDER = ['XS','S','M','L','XL','XXL','XXXL'];
    STOCK.sort((a, b) => {
      if (a.asso !== b.asso) return a.asso.localeCompare(b.asso, 'fr');
      if (a.materiel !== b.materiel) return a.materiel.localeCompare(b.materiel, 'fr');
      const ia = TAILLE_ORDER.indexOf(a.taille), ib = TAILLE_ORDER.indexOf(b.taille);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1; if (ib !== -1) return 1;
      return (a.taille||'').localeCompare(b.taille||'', 'fr');
    });
    STATE.mvtLog.unshift({date:new Date().toLocaleString('fr-FR'),asso:f.asso,materiel:f.materiel,taille,type:'entree',qty:parseInt(f.qty)||0,note:'Nouvel article',before:0,after:parseInt(f.qty)||0});
  }
  STATE.showAddStock = false;
  STATE.addStockForm = {asso:'',materiel:'',taille:'',qty:1};
  render();
}

  showConfirm(`Supprimer l'association "${nom}" ? Cette action retirera aussi son stock.`, {

// Indicateur visuel de sync
function _showSyncStatus(status) {
  let el = document.getElementById('sync-status');
  if (!el) return;
  if (status === 'saving') { el.textContent = '☁️ Sauvegarde…'; el.style.color = '#f59e0b'; }
  else if (status === 'saved') { el.textContent = '✅ Synchronisé'; el.style.color = '#22c55e'; }
  else if (status === 'error') { el.textContent = '❌ Erreur sync'; el.style.color = '#ef4444'; }
  else if (status === 'loading') { el.textContent = '🔄 Chargement…'; el.style.color = '#60a5fa'; }
}

function _initFirebase() {
  if (typeof firebase === 'undefined') { setTimeout(_initFirebase, 200); return; }
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  _db = firebase.database();
  _fbReady = true;
  // Écoute en temps réel : dès qu'un collègue modifie, tout le monde voit la mise à jour
  _db.ref('dlr_data').on('value', snapshot => {
    if (_isLoadingFromFirebase) return;
    const saved = snapshot.val();
    if (!saved) { _showSyncStatus('saved'); return; }
    _isLoadingFromFirebase = true;
    if (saved.MISSIONS  && Array.isArray(saved.MISSIONS))  { MISSIONS.length = 0;  MISSIONS.push(...saved.MISSIONS); }
    if (saved.STOCK     && Array.isArray(saved.STOCK))     { STOCK.length = 0;     STOCK.push(...saved.STOCK); }
    if (saved.TABLETTES && Array.isArray(saved.TABLETTES)) { TABLETTES.length = 0; TABLETTES.push(...saved.TABLETTES); }
    if (saved.ASSO_COLORS && typeof saved.ASSO_COLORS === 'object') {
      Object.keys(ASSO_COLORS).forEach(k => delete ASSO_COLORS[k]);
      Object.assign(ASSO_COLORS, saved.ASSO_COLORS);
    }
    if (saved.mvtLog && Array.isArray(saved.mvtLog)) STATE.mvtLog = saved.mvtLog;
    _showSyncStatus('saved');
    render();
    setTimeout(() => { _isLoadingFromFirebase = false; }, 1200);
  }, err => {
    console.warn('Firebase read error:', err);
    _showSyncStatus('error');
  });
  _showSyncStatus('loading');
}

function saveData() {
  if (_isLoadingFromFirebase) return;
  // Debounce : on attend 800ms après la dernière modif avant d'envoyer
  if (_saveTimeout) clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(() => {
    if (!_fbReady || !_db) return;
    _showSyncStatus('saving');
    _isLoadingFromFirebase = true;
    _db.ref('dlr_data').set({
      MISSIONS: (function sanitize(o){return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v));})(MISSIONS),
      STOCK: (function sanitize(o){return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v));})(STOCK),
      TABLETTES: (function sanitize(o){return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v));})(TABLETTES),
      ASSO_COLORS: (function sanitize(o){return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v));})(ASSO_COLORS),
      mvtLog: (function sanitize(o){return JSON.parse(JSON.stringify(o,(k,v)=>v===undefined?null:v));})(STATE.mvtLog),
    }).then(() => {
      _showSyncStatus('saved');
      setTimeout(() => { _isLoadingFromFirebase = false; }, 1200);
    }).catch(e => {
      console.warn('Firebase save failed:', e);
      _showSyncStatus('error');
      _isLoadingFromFirebase = false;
    });
  }, 800);
}

function loadData() {
  // Le chargement est géré par l'écouteur temps réel dans _initFirebase
  // On lance juste Firebase ici
  _initFirebase();
}

function resetData() {
  showConfirm('Réinitialiser toutes les données ? Cette action est irréversible et supprimera toutes vos modifications pour toute l\'équipe.', {
    icon:'💥', title:'Réinitialisation complète', confirmLabel:'Tout supprimer', danger:true
  }).then(ok => {
    if (!ok) return;
    if (_fbReady && _db) {
      _db.ref('dlr_data').remove().then(() => location.reload());
    } else {
      location.reload();
    }
  });
}

// ─── RENDER AVEC PRÉSERVATION DU FOCUS ────────────────────────────────────────
// Utilisé par les champs de saisie texte pour éviter la perte de focus
function renderKeepFocus(inputId) {
  const el = document.getElementById(inputId);
  const selStart = el ? el.selectionStart : null;
  const selEnd   = el ? el.selectionEnd   : null;
  render();
  const elAfter = document.getElementById(inputId);
  if (elAfter) {
    elAfter.focus();
    if (selStart !== null) {
      try { elAfter.setSelectionRange(selStart, selEnd); } catch(e) {}
    }
  }
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  // Persister à chaque render
  saveData();

  const content = document.getElementById('content');
  const map = {
    home: renderHome,
    planning: renderPlanning,
    missions: renderMissions,
    stock: renderStock,
    logistics: renderLogistics,
    tablettes: renderTablettes,
    settings: renderSettings,
  };
  content.innerHTML = (map[STATE.tab] || renderHome)();

  // Update notif badge envois/retours
  const evts = getLogisticsEvents();
  const urgentCount = evts.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=2; }).length;
  const overdueCount = getOverdueMissions().length;
  const totalAlerts = urgentCount + overdueCount;
  const notif = document.getElementById('logistics-notif');
  if (notif) notif.style.display = totalAlerts > 0 ? 'block' : 'none';

  // Badge stock prioritaire sur nav-stock
  const active = MISSIONS.filter(m => mStatus(m) === 'active');
  const prioCritical = STOCK.filter(s => s.qty <= seuilAlerte(s) && isAlertable(s) && isPrioritaire(s) && active.some(m=>m.asso===s.asso));
  const stockNotif = document.getElementById('stock-notif');
  if (stockNotif) stockNotif.style.display = prioCritical.length > 0 ? 'block' : 'none';

  // Badge tablettes dispo alerte
  const tabDispo = getTabDisponibles();
  const tabNotif = document.getElementById('tab-notif');
  if (tabNotif) tabNotif.style.display = tabDispo <= 5 ? 'block' : 'none';

  // Header urgent : inclut aussi alertes stock prioritaires
  const urgentHeader = document.getElementById('urgent-header');
  const totalUrgent = totalAlerts + prioCritical.length;
  if (urgentHeader) urgentHeader.style.display = totalUrgent > 0 ? 'flex' : 'none';
}

// ─── MODAL ENGINE ────────────────────────────────────────────────────────────
(function() {
  // Inject overlay DOM
  const overlay = document.createElement('div');
  overlay.id = 'dlr-modal-overlay';
  overlay.className = 'dlr-overlay';
  overlay.innerHTML = `
    <div class="dlr-sheet" id="dlr-sheet">
      <div class="dlr-sheet-icon" id="dlr-modal-icon"></div>
      <div class="dlr-sheet-title" id="dlr-modal-title"></div>
      <div class="dlr-sheet-body"  id="dlr-modal-body"></div>
      <div class="dlr-sheet-actions" id="dlr-modal-actions"></div>
    </div>`;
  document.body.appendChild(overlay);

  let _resolve = null;

  function _close() {
    overlay.classList.remove('open');
  }

  // Tap outside sheet closes (treat as cancel)
  overlay.addEventListener('click', e => {
    if (e.target === overlay) { _close(); if (_resolve) { _resolve(false); _resolve = null; } }
  });

  /**
   * showAlert(msg, {icon, title})
   * Returns a Promise<void>
   */
  window.showAlert = function(msg, opts = {}) {
    const icon  = opts.icon  || '⚠️';
    const title = opts.title || 'Attention';
    document.getElementById('dlr-modal-icon').textContent  = icon;
    document.getElementById('dlr-modal-title').textContent = title;
    document.getElementById('dlr-modal-body').textContent  = msg;
    const actions = document.getElementById('dlr-modal-actions');
    actions.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'dlr-btn-confirm primary';
    btn.textContent = 'OK';
    btn.onclick = () => { _close(); if (_resolve) { _resolve(true); _resolve = null; } };
    actions.appendChild(btn);
    overlay.classList.add('open');
    return new Promise(r => { _resolve = r; });
  };

  /**
   * showConfirm(msg, {icon, title, confirmLabel, danger})
   * Returns a Promise<boolean>
   */
  window.showConfirm = function(msg, opts = {}) {
    const icon         = opts.icon         || '❓';
    const title        = opts.title        || 'Confirmation';
    const confirmLabel = opts.confirmLabel || 'Confirmer';
    const style        = opts.danger       ? 'danger' : opts.warning ? 'warning' : 'primary';
    document.getElementById('dlr-modal-icon').textContent  = icon;
    document.getElementById('dlr-modal-title').textContent = title;
    document.getElementById('dlr-modal-body').textContent  = msg;
    const actions = document.getElementById('dlr-modal-actions');
    actions.innerHTML = '';
    const btnOk = document.createElement('button');
    btnOk.className = `dlr-btn-confirm ${style}`;
    btnOk.textContent = confirmLabel;
    btnOk.onclick = () => { _close(); if (_resolve) { _resolve(true); _resolve = null; } };
    const btnCancel = document.createElement('button');
    btnCancel.className = 'dlr-btn-cancel';
    btnCancel.textContent = 'Annuler';
    btnCancel.onclick = () => { _close(); if (_resolve) { _resolve(false); _resolve = null; } };
    actions.appendChild(btnOk);
    actions.appendChild(btnCancel);
    overlay.classList.add('open');
    return new Promise(r => { _resolve = r; });
  };
})();

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadData(); // ← restaurer les données sauvegardées avant le premier render
  document.getElementById('header-date').textContent = TODAY.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('week-badge').textContent = 'S.' + weekNum(TODAY);
  render();
});
</script>

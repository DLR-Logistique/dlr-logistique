<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DLR Logistique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #16161d;
  --surface2: #1e1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --muted: #7a7a9a;
  --faint: #3a3a5a;
  --font: 'Sora', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overscroll-behavior: none; }
#app { max-width: 520px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── MODAL SYSTEM ─────────────────────────────────────────────────────── */
.dlr-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0 0 env(safe-area-inset-bottom,0);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.dlr-overlay.open { opacity: 1; pointer-events: all; }
.dlr-sheet {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 28px;
  width: 100%; max-width: 520px;
  transform: translateY(32px);
  transition: transform .25s cubic-bezier(.32,1,.56,1);
  display: flex; flex-direction: column; gap: 0;
}
.dlr-overlay.open .dlr-sheet { transform: translateY(0); }
.dlr-sheet-icon { font-size: 32px; text-align: center; margin-bottom: 8px; line-height: 1; }
.dlr-sheet-title {
  font-size: 16px; font-weight: 800; text-align: center;
  margin-bottom: 8px; color: var(--text); line-height: 1.3;
}
.dlr-sheet-body {
  font-size: 13px; color: var(--muted); text-align: center;
  line-height: 1.6; margin-bottom: 20px; white-space: pre-line;
}
.dlr-sheet-actions { display: flex; flex-direction: column; gap: 8px; }
.dlr-btn-confirm {
  width: 100%; padding: 13px; border-radius: var(--radius);
  border: none; font-size: 14px; font-weight: 800; font-family: var(--font);
  cursor: pointer; transition: opacity .15s;
}
.dlr-btn-confirm:active { opacity: .7; }
.dlr-btn-confirm.danger  { background: #ef4444; color: #fff; }
.dlr-btn-confirm.warning { background: #f59e0b; color: #000; }
.dlr-btn-confirm.primary { background: var(--text); color: var(--bg); }
.dlr-btn-cancel {
  width: 100%; padding: 11px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: transparent;
  font-size: 13px; font-weight: 700; color: var(--muted);
  font-family: var(--font); cursor: pointer; transition: opacity .15s;
}
.dlr-btn-cancel:active { opacity: .7; }

/* HEADER */
.header { background: var(--surface); padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; }
.logo-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.week-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
.urgent-badge { background: #ef4444; color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 800; cursor: pointer; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 14px 14px 90px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; background: rgba(14,14,20,0.98); border-top: 1px solid var(--border); display: flex; padding: 6px 0 20px; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); gap: 4px; padding-left: 4px; padding-right: 4px; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 2px 5px; border: none; background: transparent; cursor: pointer; color: var(--muted); transition: all .2s; position: relative; border-radius: 10px; }
.nav-btn .nav-icon { font-size: 19px; line-height: 1; transition: transform .2s; }
.nav-btn .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.3px; font-family: var(--font); transition: color .2s; }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 1px; display: none; }
.nav-btn.active .nav-dot { display: block; }
.nav-btn.active .nav-icon { transform: scale(1.15); }
.nav-notif { position: absolute; top: 4px; right: calc(50% - 14px); width: 8px; height: 8px; border-radius: 50%; background: #ef4444; border: 2px solid var(--bg); }

/* Couleurs par onglet — inspirées des associations partenaires */
/* Accueil → SNSM orange */
#nav-home { --nav-color: #F4911E; --nav-bg: rgba(244,145,30,0.14); }
/* Planning → LNCC bleu roi */
#nav-planning { --nav-color: #4361EE; --nav-bg: rgba(67,97,238,0.14); }
/* Missions → MDM/MSF rouge */
#nav-missions { --nav-color: #E63946; --nav-bg: rgba(230,57,70,0.14); }
/* Stock → LPO vert */
#nav-stock { --nav-color: #52B788; --nav-bg: rgba(82,183,136,0.14); }
/* Envois → UNICEF bleu ciel */
#nav-logistics { --nav-color: #009FD9; --nav-bg: rgba(0,159,217,0.14); }
/* Tablettes → 4 Pattes violet */
#nav-tablettes { --nav-color: #9B5DE5; --nav-bg: rgba(155,93,229,0.14); }
/* Paramètres → gris neutre */
#nav-settings { --nav-color: #94a3b8; --nav-bg: rgba(148,163,184,0.14); }

.nav-btn.active {
  color: #fff;
  background: var(--nav-bg);
}
.nav-btn.active .nav-label {
  color: var(--nav-color);
}
.nav-btn.active .nav-dot {
  background: var(--nav-color);
}
/* Hover subtil */
.nav-btn:not(.active):hover {
  color: var(--nav-color, var(--muted));
  background: rgba(255,255,255,0.04);
}

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
.card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title-row .card-title { margin-bottom: 0; }
.card-count { font-size: 11px; color: var(--faint); font-family: var(--mono); }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kpi-val { font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.kpi-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }

/* ASSO AVATAR */
.asso-avatar { border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; font-family: var(--font); letter-spacing: -0.5px; }

/* MISSION ROW */
.mission-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.mission-row:last-child { border-bottom: none; }
.mission-row:active { opacity: .7; }
.mission-info { flex: 1; min-width: 0; }
.mission-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.mission-detail { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mission-right { text-align: right; flex-shrink: 0; }
.mission-days { font-size: 11px; font-family: var(--mono); }
.chevron { font-size: 14px; color: var(--faint); }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-active { background: #052e1633; color: #34d399; }
.badge-active .badge-dot { background: #34d399; }
.badge-upcoming { background: #1e3a8a33; color: #60a5fa; }
.badge-upcoming .badge-dot { background: #60a5fa; }
.badge-past { background: #1f1f2e; color: var(--muted); }
.badge-past .badge-dot { background: var(--faint); }
.badge-iti { background: #78350f33; color: #fbbf24; }
.badge-sp { background: #0c4a6e33; color: #38bdf8; }
.badge-fixe { background: #2e1065aa; color: #c084fc; }
.badge-street { background: #052e1633; color: #4ade80; }

/* STOCK BADGE */
.stock-ok { color: #34d399; font-weight: 800; }
.stock-low { color: #fbbf24; font-weight: 800; }
.stock-zero { color: #f87171; font-weight: 800; }

/* ALERT BOX */
.alert-box { background: #7f1d1d33; border: 1px solid #ef444433; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fca5a5; margin-bottom: 10px; }
.info-box { background: #78350f33; border: 1px solid #f59e0b44; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fcd34d; margin-bottom: 12px; line-height: 1.7; }

/* LOGISTICS EVENT */
.log-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); transition: opacity .15s; }
.log-row:last-child { border-bottom: none; }
.log-row[onclick]:hover { opacity: .75; }
.log-row[onclick]:active { opacity: .5; }
.log-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.log-envoi .log-icon { background: #1e3a8a33; color: #60a5fa; }
.log-retour .log-icon { background: #052e1633; color: #34d399; }
.log-info { flex: 1; min-width: 0; }
.log-name { font-size: 12px; font-weight: 700; }
.log-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.log-date { text-align: right; flex-shrink: 0; }
.log-date-val { font-size: 12px; font-weight: 800; font-family: var(--mono); }
.log-date-d { font-size: 10px; color: var(--muted); }
.log-urgent .log-date-val { color: #f87171; }
.log-urgent .log-date-d { color: #f87171; }

/* RETARD RETOUR */
.alert-overdue { background: #4a0d0d55; border: 1px solid #ef444466; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fca5a5; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; }
.alert-overdue-icon { font-size: 18px; flex-shrink: 0; }
.alert-overdue-content { flex: 1; }
.alert-overdue-title { font-weight: 800; font-size: 13px; color: #f87171; margin-bottom: 4px; }
.alert-overdue-row { padding: 6px 0; border-bottom: 1px solid rgba(239,68,68,0.15); font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.alert-overdue-row:last-child { border-bottom: none; }
.alert-overdue-row:active { opacity: .7; }
.overdue-days { font-family: var(--mono); font-weight: 800; color: #f87171; font-size: 13px; }

/* GANTT */
.gantt-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.gantt-inner { min-width: 440px; }
.gantt-months { display: flex; margin-left: 80px; margin-bottom: 4px; }
.gantt-month { font-size: 9px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
.gantt-row { display: flex; align-items: center; margin-bottom: 5px; }
.gantt-label { width: 80px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
.gantt-label-text { font-size: 9px; font-weight: 700; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px; }
.gantt-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; position: relative; overflow: hidden; }
.gantt-bar { position: absolute; top: 3px; height: 16px; border-radius: 4px; display: flex; align-items: center; padding: 0 5px; overflow: hidden; cursor: pointer; transition: opacity .15s; }
.gantt-bar:hover { opacity: .8; }
.gantt-bar-label { font-size: 8px; color: rgba(255,255,255,.85); font-weight: 700; white-space: nowrap; }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 10; }

/* FILTERS */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filter-sel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; cursor: pointer; }
.search-inp { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; width: 100%; margin-bottom: 10px; }
.search-inp::placeholder { color: var(--muted); }
.filter-sel option { background: #1e1e28; }

/* STOCK ASSO BLOCK */
.stock-asso-block { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.stock-asso-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid; }
.stock-asso-header-name { font-weight: 800; font-size: 13px; flex: 1; }
.stock-asso-header-count { font-size: 11px; font-family: var(--mono); }
.stock-item-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; border-bottom: 1px solid var(--border); }
.stock-item-row:last-child { border-bottom: none; }
.stock-item-name { font-size: 12px; color: var(--muted); }
.stock-item-taille { background: var(--surface2); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-family: var(--mono); color: var(--muted); }
.stock-qty { font-size: 14px; font-weight: 800; }
.stock-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
.s-ok { background: #052e1633; color: #34d399; }
.s-low { background: #78350f33; color: #fbbf24; }
.s-zero { background: #7f1d1d33; color: #f87171; }
.s-mission { background: #1e3a8a33; color: #60a5fa; }

/* TABLETTE ROW */
.tab-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tab-row:last-child { border-bottom: none; }
.tab-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.tab-info { flex: 1; min-width: 0; }
.tab-nom { font-size: 13px; font-weight: 700; }
.tab-serie { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.tab-note { font-size: 11px; color: #fbbf24; margin-top: 1px; }
.tab-right { text-align: right; }
.tab-ios { font-size: 10px; color: var(--muted); font-family: var(--mono); }

/* DETAIL CARD */
.detail-header { border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border-left: 4px solid; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 10px; }
.detail-field { }
.detail-label { color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-val { font-weight: 700; margin-top: 2px; }
.detail-val.mono { font-family: var(--mono); font-size: 11px; }

/* LOG CARD */
.log-action-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; }
.log-action-card.urgent { border-color: #f59e0b44; background: #78350f22; }
.log-action-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.log-action-info { flex: 1; }
.log-action-title { font-size: 12px; font-weight: 700; }
.log-action-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.log-action-status { font-size: 11px; font-weight: 800; text-align: right; flex-shrink: 0; }

/* MVT FORM */
.mvt-form { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.mvt-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.form-field-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.form-inp { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; width: 100%; }
.form-inp option { background: #1e1e28; }

/* BUTTONS */
.btn { padding: 10px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--font); transition: opacity .15s; }
.btn:active { opacity: .7; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-ghost { background: var(--surface2); color: var(--muted); }
.btn-full { width: 100%; padding: 12px; border-radius: var(--radius); margin-bottom: 12px; }
.btn-back { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; padding: 0 0 14px 0; font-family: var(--font); display: flex; align-items: center; gap: 5px; }

/* PROGRESS */
.progress-wrap { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .4s; }

/* SECTION DIVIDER */
.section-sep { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--faint); margin: 14px 0 8px; }

/* HISTORY ROW */
.history-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }

/* QUARTER TABS */
.quarter-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.q-tab { padding: 6px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: var(--font); }
.q-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* CROISE ROW */
.croise-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
.croise-row:last-child { border-bottom: none; }
.croise-missions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.croise-mission-tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

/* SCROLL indicator */
.scroll-hint { text-align: center; font-size: 10px; color: var(--faint); padding: 8px 0; }

/* RETOUR PARTIEL */
.retour-partiel-bar { height: 5px; border-radius: 99px; overflow: hidden; background: var(--surface2); margin-top: 6px; }
.retour-partiel-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.badge-partial { background: #78350f33; color: #fbbf24; }
.badge-rendu-complet { background: #052e1633; color: #34d399; }
.badge-rendu-partial { background: #78350f33; color: #fbbf24; }

/* SETTINGS / GESTION ASSOS */
.asso-manage-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
.asso-manage-row:last-child { border-bottom:none; }
.asso-color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.asso-manage-name { flex:1; font-size:13px; font-weight:700; }
.asso-manage-missions { font-size:11px; color:var(--muted); font-family:var(--mono); }
.btn-delete { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#f87171; border-radius:6px; padding:5px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:var(--font); }
.btn-delete:active { opacity:.7; }
.btn-delete:disabled { opacity:.3; cursor:not-allowed; }
.add-asso-form { background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; margin-bottom:14px; }
.color-picker-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-top:6px; }
.color-swatch { width:100%; aspect-ratio:1; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.color-swatch.selected { border-color:#fff; transform:scale(1.1); }

.badge-annulee { background: rgba(239,68,68,0.12); color: #f87171; }
.badge-annulee .badge-dot { background: #f87171; }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function addDays(ds, n) { const d = new Date(ds); d.setDate(d.getDate()+n); return d; }
function fmtDate(d) {
  if (!d) return '–';
  const dt = (typeof d === 'string') ? new Date(d) : d;
  return dt.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function daysUntil(ds) {
  const d = new Date(ds);
  return Math.round((d - TODAY) / 86400000);
}
function diffDays(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function weekNum(d) { const jan1 = new Date(d.getFullYear(),0,1); return Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7); }

function mStatus(m) {
  if (m.annulee) return 'annulee';
  const d = new Date(m.debut), f = new Date(m.fin);
  if (TODAY >= d && TODAY <= f) return 'active';
  if (d > TODAY) return 'upcoming';
  return 'past';
}

function assoAvatar(asso, size=36) {
  const c = ac(asso);
  const init = asso.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  const fs = Math.round(size*0.32);
  const br = Math.round(size/3);
  return `<div class="asso-avatar" style="width:${size}px;height:${size}px;border-radius:${br}px;background:${c.p};font-size:${fs}px;color:#fff;">${init}</div>`;
}

function statusBadge(st) {
  const conf = {
    active: {cls:'badge-active', dot:true, label:'En cours'},
    upcoming: {cls:'badge-upcoming', dot:true, label:'À venir'},
    past: {cls:'badge-past', dot:true, label:'Terminée'},
    annulee: {cls:'badge-annulee', dot:true, label:'Annulée'},
  }[st]||{cls:'badge-past',dot:true,label:st};
  return `<span class="badge ${conf.cls}"><span class="badge-dot"></span>${conf.label}</span>`;
}

function typeBadge(type) {
  const conf = {
    'Itinérante':{cls:'badge-iti',label:'ITI'},
    'Sites privés':{cls:'badge-sp',label:'SP'},
    'FIXE':{cls:'badge-fixe',label:'FIXE'},
    'Street':{cls:'badge-street',label:'STREET'},
  }[type]||{cls:'badge-past',label:type};
  return `<span class="badge ${conf.cls}">${conf.label}</span>`;
}

function getLogisticsEvents() {
  const evts = [];
  MISSIONS.forEach(m => {
    const st = mStatus(m);
    if (st === 'past') return;
    const sendDate = addDays(m.debut, -5);
    const retDate = addDays(m.fin, -3);
    if (sendDate >= TODAY || daysUntil(sendDate) > -3)
      evts.push({type:'envoi', asso:m.asso, lieu:m.lieu, re:m.re, date:sendDate, mId:m.id, s:m.s, code:m.code});
    if (retDate >= TODAY)
      evts.push({type:'retour', asso:m.asso, lieu:m.lieu, re:m.re, date:retDate, mId:m.id, s:m.s, code:m.code, finDate:m.fin});
  });
  return evts.sort((a,b) => a.date - b.date);
}

// Tailles de vêtements exclues des alertes (peu de stock normal pour ces tailles)
const TAILLES_SANS_ALERTE = ['S', 'XXL'];
// Tailles prioritaires pour les alertes vêtements
const TAILLES_PRIORITAIRES = ['M', 'L', 'XL'];
// Matériels sans taille à surveiller en priorité
const MATERIELS_PRIORITAIRES = ['Comptoir', 'Kakémono'];

function isAlertable(s) {
  if (s.taille && TAILLES_SANS_ALERTE.includes(s.taille)) return false;
  return true;
}

// Indique si un article est "prioritaire" (M/L/XL vêtements, Comptoir, Kakémono)
function isPrioritaire(s) {
  if (MATERIELS_PRIORITAIRES.includes(s.materiel)) return true;
  if (s.taille && TAILLES_PRIORITAIRES.includes(s.taille)) return true;
  return false;
}

// Seuil d'alerte selon la priorité
function seuilAlerte(s) {
  if (isPrioritaire(s)) return 3; // seuil plus haut pour les prioritaires
  return 2;
}

function getAlertPriority(s) {
  // 0 = rupture prioritaire, 1 = bas stock prioritaire, 2 = rupture normal, 3 = bas stock normal
  const prio = isPrioritaire(s);
  if (s.qty === 0) return prio ? 0 : 2;
  return prio ? 1 : 3;
}

function getStockByAsso() {
  const r = {};
  STOCK.forEach(s => {
    if (!r[s.asso]) r[s.asso] = {total:0, alerts:0, alertsPrio:0};
    r[s.asso].total += s.qty;
    if (s.qty <= seuilAlerte(s) && isAlertable(s)) {
      r[s.asso].alerts++;
      if (isPrioritaire(s)) r[s.asso].alertsPrio++;
    }
  });
  return r;
}

// Nombre de tablettes disponibles (état 'ok' et non en mission)
function getTabDisponibles() {
  return TABLETTES.filter(t => t.etat === 'ok' && !t.missionId).length;
}
function getTabTotal() {
  return TABLETTES.filter(t => t.etat !== 'hs').length;
}

// Retours en retard : missions terminées depuis plus de 7 jours
// ET dont le matériel n'a pas encore été intégralement rendu
function missionToutRendu(m) {
  if (!m.materielEnvoye || m.materielEnvoye.length === 0) return true;
  return m.materielEnvoye.every((e, idx) => {
    const totalItems = (e.nb_vetements || 0) + (e.nb_tablettes || 0) + (e.nb_kakemonos || 0) + (e.nb_comptoirs || 0) + (e.nb_chargeurs || 0);
    if (totalItems === 0) return true;
    return m.checklist && m.checklist[`envoi_${idx}_rendu`] === true;
  });
}

function getOverdueMissions() {
  return MISSIONS.filter(m => {
    if (mStatus(m) !== 'past') return false;
    const deadline = addDays(m.fin, 7);
    if (!(TODAY > deadline)) return false;
    // Ne pas signaler si tout le matériel a déjà été rendu
    return !missionToutRendu(m);
  }).map(m => {
    const deadline = addDays(m.fin, 7);
    const daysLate = Math.round((TODAY - deadline) / 86400000);
    return { ...m, deadline, daysLate };
  }).sort((a, b) => b.daysLate - a.daysLate);
}

function renderMissionRow(m, showDetail=false) {
  const st = mStatus(m);
  const c = ac(m.asso);
  const dLeft = st === 'active' ? daysUntil(m.fin) : null;
  const dStart = st === 'upcoming' ? daysUntil(m.debut) : null;
  const daysColor = dLeft !== null ? (dLeft < 7 ? '#f87171' : '#9ca3af') : '#60a5fa';
  const daysText = dLeft !== null ? `${dLeft}j` : dStart !== null ? `dans ${dStart}j` : '';
  const extra = showDetail ? `<div style="font-size:10px;color:var(--faint);margin-top:2px;font-family:var(--mono)">S.${m.s} · ${fmtDate(m.debut)} → ${fmtDate(m.fin)}</div>` : '';
  return `
    <div class="mission-row" onclick="openMission(${m.id})">
      ${assoAvatar(m.asso, 36)}
      <div class="mission-info">
        <div class="mission-name">${m.asso} ${statusBadge(st)} ${typeBadge(m.type)}</div>
        <div class="mission-detail">${m.lieu} · ${m.re||'?'}</div>
        ${extra}
      </div>
      <div class="mission-right">
        <div class="mission-days" style="color:${daysColor}">${daysText}</div>
        <div class="chevron">›</div>
      </div>
    </div>`;
}

function renderLogRow(e, expanded=false) {
  const isEnvoi = e.type === 'envoi';
  const d = daysUntil(e.date);
  const urgent = d >= 0 && d <= 2;
  const c = ac(e.asso);
  const dText = d < 0 ? 'Passé' : d === 0 ? 'Aujourd\'hui ⚡' : `J+${d}`;
  const icon = isEnvoi ? '↗' : '↩';
  const typeLabel = isEnvoi ? `Envoi J−5 (S.${e.s})` : 'Retour J−3/4';
  const clickAttr = e.mId ? `onclick="openMission(${e.mId})" title="Ouvrir la mission"` : '';
  const cursorStyle = e.mId ? 'cursor:pointer;' : '';
  return `
    <div class="log-row ${isEnvoi?'log-envoi':'log-retour'} ${urgent?'log-urgent':''}" ${clickAttr} style="${cursorStyle}">
      <div class="log-icon">${icon}</div>
      <div class="log-info">
        <div class="log-name" style="display:flex;align-items:center;gap:6px">${assoAvatar(e.asso,20)} ${e.asso} — ${e.lieu}</div>
        <div class="log-sub">${typeLabel} · ${e.re||'?'}</div>
      </div>
      <div class="log-date ${urgent?'log-urgent':''}">
        <div class="log-date-val" style="color:${isEnvoi?'#60a5fa':'#34d399'}">${fmtDate(e.date)}</div>
        <div class="log-date-d">${dText}${e.mId ? ' ›' : ''}</div>
      </div>
    </div>`;
}

function renderAssoPlanningAnnuel(asso) {
  const c = ac(asso);
  const Y = new Date().getFullYear();
  const yearStart = new Date(`${Y}-01-01`);
  const yearEnd   = new Date(`${Y}-12-31`);
  const totalDays = Math.round((yearEnd - yearStart) / 86400000) + 1;

  const missions = MISSIONS.filter(m => m.asso === asso).sort((a,b) => new Date(a.debut)-new Date(b.debut));

  // Month headers (12 months)
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  let monthsHtml = '';
  months.forEach((lbl, i) => {
    const mStart = new Date(Y, i, 1);
    const mEnd   = new Date(Y, i+1, 0);
    const days = mEnd.getDate();
    const pct = days / totalDays * 100;
    monthsHtml += `<div class="gantt-month" style="width:${pct}%;text-align:center;padding-left:2px">${lbl}</div>`;
  });

  // Today marker
  const todayOffset = Math.round((TODAY - yearStart) / 86400000);
  const todayPct = (TODAY >= yearStart && TODAY <= yearEnd) ? `${todayOffset / totalDays * 100}%` : null;

  // Build one row per mission
  let rows = '';
  if (missions.length === 0) {
    rows = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Aucune mission pour ${asso} en ${Y}</div>`;
  } else {
    missions.forEach(m => {
      const d = new Date(m.debut);
      const f = new Date(m.fin);
      const cs = d < yearStart ? yearStart : d;
      const ce = f > yearEnd   ? yearEnd   : f;
      const left  = Math.max(0, Math.round((cs - yearStart) / 86400000)) / totalDays * 100;
      const width = Math.max(0.8, (Math.round((ce - cs) / 86400000)+1) / totalDays * 100);
      const st = mStatus(m);
      const opacity = st === 'past' ? '0.4' : '1';
      const debutFmt = fmtDate(m.debut);
      const finFmt   = fmtDate(m.fin);

      // Row label: semaine de début
      const sLabel = `S.${m.s}`;

      rows += `
      <div style="display:flex;align-items:center;margin-bottom:6px;gap:6px">
        <div style="width:34px;flex-shrink:0;font-size:9px;font-weight:700;color:var(--muted);font-family:var(--mono);text-align:right">${sLabel}</div>
        <div style="flex:1;height:26px;background:var(--surface2);border-radius:6px;position:relative;overflow:visible">
          ${todayPct?`<div style="position:absolute;top:0;bottom:0;left:${todayPct};width:2px;background:#ef4444;z-index:10;border-radius:1px"></div>`:''}
          <div onclick="openMission(${m.id})"
               title="${m.lieu} · ${debutFmt} → ${finFmt} · ${m.re}"
               style="position:absolute;top:3px;height:20px;left:${left}%;width:${width}%;background:${c.p};opacity:${opacity};border-radius:4px;display:flex;align-items:center;padding:0 6px;cursor:pointer;transition:opacity .15s;min-width:4px;overflow:hidden"
               onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='${opacity}'">
            <span style="font-size:8px;color:rgba(255,255,255,.9);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.lieu}</span>
          </div>
        </div>
      </div>`;
    });
  }

  // Stats
  const nbTotal    = missions.length;
  const nbActive   = missions.filter(m=>mStatus(m)==='active').length;
  const nbUpcoming = missions.filter(m=>mStatus(m)==='upcoming').length;
  const nbPast     = missions.filter(m=>mStatus(m)==='past').length;

  // List below gantt
  let listHtml = missions.map(m => renderMissionRow(m, true)).join('');

  return `
    <button class="btn-back" onclick="closeAssoPlanningAnnuel()">← Retour au planning</button>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      ${assoAvatar(asso, 44)}
      <div>
        <div style="font-size:20px;font-weight:900;letter-spacing:-0.5px">${asso}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Planning annuel ${Y} · ${nbTotal} mission${nbTotal>1?'s':''}</div>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="kpi-card" style="border-color:${nbActive?'#34d39933':'var(--border)'}">
        <div class="kpi-val" style="color:#34d399;font-size:24px">${nbActive}</div>
        <div class="kpi-label">En cours</div>
      </div>
      <div class="kpi-card" style="border-color:${nbUpcoming?'#60a5fa33':'var(--border)'}">
        <div class="kpi-val" style="color:#60a5fa;font-size:24px">${nbUpcoming}</div>
        <div class="kpi-label">À venir</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="font-size:24px;color:var(--muted)">${nbPast}</div>
        <div class="kpi-label">Terminées</div>
      </div>
    </div>

    <div class="card" style="padding:14px 12px;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:10px">Gantt annuel ${Y}</div>
      <div class="gantt-wrap">
        <div style="min-width:440px">
          <div style="margin-left:40px;margin-bottom:4px;display:flex">${monthsHtml}</div>
          ${rows}
        </div>
      </div>
      ${todayPct?`<div style="text-align:right;font-size:10px;color:#f87171;margin-top:6px;font-family:var(--mono)">▲ Aujourd'hui</div>`:''}
    </div>

    ${missions.length > 0 ? `
    <div class="card">
      <div class="card-title-row">
        <div class="card-title">Détail des missions</div>
        <div class="card-count">${missions.length}</div>
      </div>
      ${listHtml}
    </div>` : ''}
  `;
}

function renderPlanning() {
  if (STATE.selectedAsso) return renderAssoPlanningAnnuel(STATE.selectedAsso);
  const Y = new Date().getFullYear();
  const quarters = {
    Q1:{start:`${Y}-01-01`,end:`${Y}-03-31`,label:'Jan – Mars'},
    Q2:{start:`${Y}-04-01`,end:`${Y}-06-30`,label:'Avr – Juin'},
    Q3:{start:`${Y}-07-01`,end:`${Y}-09-30`,label:'Juil – Sept'},
    Q4:{start:`${Y}-10-01`,end:`${Y}-12-31`,label:'Oct – Déc'},
  };
  const q = quarters[STATE.quarter];
  const pStart = new Date(q.start), pEnd = new Date(q.end);
  const totalDays = diffDays(q.start, q.end) + 1;

  const vis = MISSIONS.filter(m => {
    const d=new Date(m.debut),f=new Date(m.fin);
    return d<=pEnd && f>=pStart;
  });
  const assos = [...new Set(vis.map(m=>m.asso))].sort();

  // Month headers
  let monthsHtml = '';
  let cur = new Date(pStart);
  while (cur <= pEnd) {
    const nm = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    const endM = nm < pEnd ? nm : new Date(pEnd.getTime()+86400000);
    const days = Math.round((endM - cur) / 86400000);
    const pct = days / totalDays * 100;
    const label = cur.toLocaleDateString('fr-FR',{month:'short'}).replace('.','');
    monthsHtml += `<div class="gantt-month" style="width:${pct}%">${label}</div>`;
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const todayPct = TODAY >= pStart && TODAY <= pEnd
    ? `${diffDays(q.start, TODAY.toISOString().split('T')[0]) / totalDays * 100}%`
    : null;

  let ganttRows = '';
  assos.forEach(asso => {
    const c = ac(asso);
    const aMs = vis.filter(m=>m.asso===asso);
    let bars = '';
    aMs.forEach(m => {
      const d=new Date(m.debut), f=new Date(m.fin);
      const cs = d<pStart?pStart:d;
      const ce = f>pEnd?pEnd:f;
      const left = diffDays(q.start, cs.toISOString().split('T')[0]) / totalDays * 100;
      const width = (diffDays(cs.toISOString().split('T')[0], ce.toISOString().split('T')[0])+1) / totalDays * 100;
      const opacity = mStatus(m)==='past' ? '0.35' : '1';
      bars += `<div class="gantt-bar" onclick="openMission(${m.id})" title="${m.asso} · ${m.lieu} · ${m.re}" style="left:${left}%;width:${Math.max(width,1)}%;background:${c.p};opacity:${opacity}">
        <span class="gantt-bar-label">${m.lieu}</span>
      </div>`;
    });
    ganttRows += `<div class="gantt-row">
      <div class="gantt-label" onclick="openAssoPlanningAnnuel('${asso}')" style="cursor:pointer" title="Voir planning annuel ${asso}">
        ${assoAvatar(asso,20)}
        <span class="gantt-label-text" style="color:${c.p}">${asso}</span>
      </div>
      <div class="gantt-track">
        ${todayPct?`<div class="gantt-today" style="left:${todayPct}"></div>`:''}
        ${bars}
      </div>
    </div>`;
  });

  const soon = MISSIONS.filter(m=>mStatus(m)==='upcoming'&&daysUntil(m.debut)>=0&&daysUntil(m.debut)<=28).sort((a,b)=>new Date(a.debut)-new Date(b.debut));

  return `
    <div class="quarter-tabs">
      ${Object.entries(quarters).map(([k,v])=>`<button class="q-tab ${STATE.quarter===k?'active':''}" onclick="setQuarter('${k}')">${k} · ${v.label}</button>`).join('')}
    </div>
    <div class="card" style="padding:14px 12px">
      <div class="gantt-wrap">
        <div class="gantt-inner">
          <div class="gantt-months" style="margin-left:80px;margin-bottom:4px;display:flex">${monthsHtml}</div>
          ${ganttRows}
        </div>
      </div>
      ${todayPct?`<div style="text-align:right;font-size:10px;color:#f87171;margin-top:6px;font-family:var(--mono)">▲ Aujourd'hui</div>`:''}
      <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        ${[['MDM','#E63946'],['MSF','#FF6B35'],['ACF','#CC2029'],['SC','#0D9488']].map(([n,col])=>
          `<div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:${col};flex-shrink:0"></div><span style="font-size:10px;font-weight:700;color:${col};font-family:var(--mono)">${n}</span></div>`
        ).join('')}
        <span style="font-size:10px;color:var(--faint);flex:1">couleurs distinctes · missions simultanées</span>
      </div>
    </div>
    ${soon.length ? `<div class="card">
      <div class="card-title-row"><div class="card-title">Départ dans 4 semaines</div><div class="card-count">${soon.length}</div></div>
      ${soon.map(m=>renderMissionRow(m,true)).join('')}
    </div>` : ''}`;
}

function renderMissions() {
  if (STATE.selectedMission) return renderMissionDetail(STATE.selectedMission);

  const filtered = MISSIONS.filter(m => {
    if (STATE.filterAsso !== 'all' && m.asso !== STATE.filterAsso) return false;
    if (STATE.filterType !== 'all' && m.type !== STATE.filterType) return false;
    if (STATE.filterStatus !== 'all' && mStatus(m) !== STATE.filterStatus) return false;
    // Par défaut, masquer les missions annulées sauf si filtre explicite
    if (STATE.filterStatus === 'all' && m.annulee) return false;
    return true;
  });

  const assoOpts = [...new Set(MISSIONS.map(m=>m.asso))].sort().map(a=>`<option value="${a}" ${STATE.filterAsso===a?'selected':''}>${a}</option>`).join('');

  const allAssos = [...new Set([...MISSIONS.map(m=>m.asso),...Object.keys(ASSO_COLORS)])].sort();
  const addMissionHtml = STATE.showAddMission ? `
    <div class="mvt-form" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">➕ Nouvelle mission</div>
      <div class="mvt-form-grid">
        <div><div class="form-field-label">Association</div>
          <select class="form-inp" id="nm-asso" onchange="STATE.addMissionForm.asso=this.value">
            <option value="">--</option>
            ${allAssos.map(a=>`<option value="${a}" ${STATE.addMissionForm.asso===a?'selected':''}>${a}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Lieu</div>
          <input class="form-inp" id="nm-lieu" placeholder="ex: PARIS" value="${STATE.addMissionForm.lieu}" oninput="STATE.addMissionForm.lieu=this.value"></div>
        <div><div class="form-field-label">Responsable (RE)</div>
          <input class="form-inp" id="nm-re" placeholder="Prénom Nom" value="${STATE.addMissionForm.re}" oninput="STATE.addMissionForm.re=this.value"></div>
        <div><div class="form-field-label">Type</div>
          <select class="form-inp" id="nm-type" onchange="STATE.addMissionForm.type=this.value">
            ${['Itinérante','Sites privés','FIXE','Street'].map(t=>`<option value="${t}" ${STATE.addMissionForm.type===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Date début</div>
          <input type="date" class="form-inp" id="nm-debut" value="${STATE.addMissionForm.debut}" oninput="STATE.addMissionForm.debut=this.value"></div>
        <div><div class="form-field-label">Date fin</div>
          <input type="date" class="form-inp" id="nm-fin" value="${STATE.addMissionForm.fin}" oninput="STATE.addMissionForm.fin=this.value"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="addMission()">✅ Créer la mission</button>
        <button class="btn btn-ghost" style="flex:1" onclick="STATE.showAddMission=false;render()">Annuler</button>
      </div>
    </div>` : '';

  return `
    <button class="btn btn-primary btn-full" onclick="STATE.showAddMission=!STATE.showAddMission;render()">
      ${STATE.showAddMission ? '✕ Fermer' : '➕ Nouvelle mission'}
    </button>
    ${addMissionHtml}
    <div class="filters">
      <select class="filter-sel" onchange="STATE.filterAsso=this.value;render()">
        <option value="all">Toutes assos</option>${assoOpts}
      </select>
      <select class="filter-sel" onchange="STATE.filterType=this.value;render()">
        <option value="all" ${STATE.filterType==='all'?'selected':''}>Tous types</option>
        <option value="Itinérante" ${STATE.filterType==='Itinérante'?'selected':''}>Itinérante</option>
        <option value="Sites privés" ${STATE.filterType==='Sites privés'?'selected':''}>Sites privés</option>
        <option value="FIXE" ${STATE.filterType==='FIXE'?'selected':''}>Fixe</option>
      </select>
      <select class="filter-sel" onchange="STATE.filterStatus=this.value;render()">
        <option value="all" ${STATE.filterStatus==='all'?'selected':''}>Tous statuts</option>
        <option value="active" ${STATE.filterStatus==='active'?'selected':''}>En cours</option>
        <option value="upcoming" ${STATE.filterStatus==='upcoming'?'selected':''}>À venir</option>
        <option value="past" ${STATE.filterStatus==='past'?'selected':''}>Terminées</option>
        <option value="annulee" ${STATE.filterStatus==='annulee'?'selected':''}>🚫 Annulées</option>
      </select>
    </div>
    <div style="font-size:10px;color:var(--faint);font-family:var(--mono);margin-bottom:10px">${filtered.length} mission(s)</div>
    <div class="card">${filtered.map(m=>renderMissionRow(m,true)).join('')}</div>`;
}

function getNormeInfo(type) {
  if (type === 'Itinérante') return {label:'ITI', pers:8, vetements:true, tablettes:true, kakemonos:false, comptoirs:false, desc:'8 pers. · Vêtements + Tablettes'};
  if (type === 'Sites privés') return {label:'SP', pers:'3/4', vetements:true, tablettes:true, kakemonos:2, comptoirs:1, desc:'3/4 pers. · Vêtements + Tablettes + 2 Kakémonos + 1 Comptoir'};
  if (type === 'FIXE') return {label:'FIXE', pers:10, vetements:true, tablettes:true, kakemonos:false, comptoirs:false, desc:'10 pers. · Vêtements + Tablettes'};
  return null;
}

function renderMissionDetail(m) {
  const st = mStatus(m);
  const c = ac(m.asso);
  const sendDate = addDays(m.debut, -5);
  const retDate = addDays(m.fin, -3);
  const dToSend = daysUntil(sendDate);
  const dToRet = daysUntil(retDate);
  const dLeft = daysUntil(m.fin);
  const mStock = STOCK.filter(s=>s.asso===m.asso);
  const totalStock = mStock.reduce((a,s)=>a+s.qty,0);
  const critiques = mStock.filter(s=>s.qty<=2 && isAlertable(s));
  const norme = getNormeInfo(m.type);
  const isEditing = STATE.editingMissionId === m.id;
  const showEnvoi = STATE.showEnvoiForm[m.id];

  function logActionCard(icon, iconBg, iconColor, title, sub, date, statusText, statusColor, urgent) {
    return `<div class="log-action-card ${urgent?'urgent':''}">
      <div class="log-action-icon" style="background:${iconBg};color:${iconColor}">${icon}</div>
      <div class="log-action-info">
        <div class="log-action-title">${title}</div>
        <div class="log-action-sub">${sub} · ${fmtDate(date)}</div>
      </div>
      <div class="log-action-status" style="color:${statusColor}">${statusText}</div>
    </div>`;
  }

  const sendStatus = dToSend < 0 ? 'Effectué' : dToSend===0 ? 'Aujourd\'hui !' : dToSend<=3 ? `Dans ${dToSend}j ⚡` : `Dans ${dToSend}j`;
  const retStatus = dToRet < 0 ? 'Passé' : dToRet===0 ? 'Aujourd\'hui !' : dToRet<=3 ? `Dans ${dToRet}j ⚡` : `Dans ${dToRet}j`;

  // Unique vetement types for this asso — seulement ceux avec stock > 0
  const vetTypes = [...new Set(STOCK.filter(s=>s.asso===m.asso && s.taille && s.qty>0).map(s=>s.materiel))].sort();
  const taillesDispos = [...new Set(STOCK.filter(s=>s.asso===m.asso && s.taille && s.qty>0).map(s=>s.taille))];
  const taillesOrder = ['XS','S','M','L','XL','XXL','XXXL'];
  taillesDispos.sort((a,b)=>taillesOrder.indexOf(a)-taillesOrder.indexOf(b));
  // Tablettes dispo : état 'ok' ET non déjà engagées dans les autres envois de cette mission
  const tabsDejaEnvoyes = new Set((m.materielEnvoye||[]).flatMap(e=>e.tablettes_noms||[]));
  const tablettesDispos = TABLETTES.filter(t=>t.etat==='ok' && !tabsDejaEnvoyes.has(t.nom)).map(t=>t.nom).sort();
  // Stock dispo kakémonos / comptoirs pour cette asso
  const kakDispo = (STOCK.find(s=>s.asso===m.asso && s.materiel==='Kakémono')||{}).qty||0;
  const cptDispo = (STOCK.find(s=>s.asso===m.asso && s.materiel==='Comptoir')||{}).qty||0;

  // Checklist items (materielEnvoye)
  const checklist = m.checklist || {};
  const envois = m.materielEnvoye || [];

  // Edit form
  const editForm = STATE.editMissionForm;

  let editHtml = '';
  if (isEditing) {
    editHtml = `<div class="mvt-form" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">✏️ Modifier la mission</div>
      <div class="mvt-form-grid">
        <div><div class="form-field-label">Association</div>
          <input class="form-inp" id="em-asso" value="${editForm.asso||m.asso}"></div>
        <div><div class="form-field-label">Lieu</div>
          <input class="form-inp" id="em-lieu" value="${editForm.lieu||m.lieu}"></div>
        <div><div class="form-field-label">RE</div>
          <input class="form-inp" id="em-re" value="${editForm.re||m.re||''}"></div>
        <div><div class="form-field-label">Type</div>
          <select class="form-inp" id="em-type">
            ${['Itinérante','Sites privés','FIXE','Street'].map(t=>`<option value="${t}" ${(editForm.type||m.type)===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Date début</div>
          <input type="date" class="form-inp" id="em-debut" value="${editForm.debut||m.debut}"></div>
        <div><div class="form-field-label">Date fin</div>
          <input type="date" class="form-inp" id="em-fin" value="${editForm.fin||m.fin}"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="saveMissionEdit(${m.id})">💾 Enregistrer</button>
        <button class="btn btn-ghost" style="flex:1" onclick="STATE.editingMissionId=null;render()">Annuler</button>
      </div>
    </div>`;
  }

  // Envoi form with dropdowns
  let envoiFormHtml = '';
  if (showEnvoi) {
    const ef = STATE.envoiForm;
    // Lignes vêtements déjà ajoutées
    const lignesVet = ef.lignes_vetements || [];
    const lf = STATE.envoiLigneForm;
    // Tailles dispo pour le type vêtement de la ligne en cours
    const taillesPourLigne = lf.type_vetement
      ? [...new Set(STOCK.filter(s=>s.asso===m.asso && s.materiel===lf.type_vetement && s.qty>0).map(s=>s.taille))].sort((a,b)=>taillesOrder.indexOf(a)-taillesOrder.indexOf(b))
      : taillesDispos;
    const stockLigneVet = (lf.type_vetement && lf.taille)
      ? (STOCK.find(s=>s.asso===m.asso && s.materiel===lf.type_vetement && s.taille===lf.taille)||{}).qty||0
      : 20;
    // Total vêtements dans les lignes
    const totalVetLignes = lignesVet.reduce((a,l)=>a+l.nb,0);

    envoiFormHtml = `<div class="mvt-form" style="margin-top:10px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">📤 Enregistrer un envoi</div>
      ${norme ? `<div class="info-box" style="margin-bottom:10px;padding:8px 10px;font-size:11px">
        📋 Norme <strong>${norme.label}</strong> : ${norme.desc}
      </div>` : ''}

      <!-- SECTION VÊTEMENTS MULTI-LIGNES -->
      <div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)">👕 Vêtements</div>
          ${totalVetLignes > 0 ? `<span style="background:rgba(59,130,246,.2);color:#60a5fa;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800">${totalVetLignes} pcs · ${lignesVet.length} ligne${lignesVet.length>1?'s':''}</span>` : ''}
        </div>

        <!-- Lignes déjà ajoutées -->
        ${lignesVet.length > 0 ? `<div style="margin-bottom:8px;display:flex;flex-direction:column;gap:4px">
          ${lignesVet.map((l,i)=>`<div style="display:flex;align-items:center;gap:6px;background:var(--surface2);border-radius:8px;padding:6px 10px;border:1px solid var(--border)">
            <span style="font-size:18px;font-weight:900;color:#60a5fa;min-width:28px;text-align:right;font-family:var(--mono)">${l.nb}</span>
            <span style="font-size:12px;font-weight:700;flex:1">${l.type} <span style="background:rgba(59,130,246,.2);color:#93c5fd;border-radius:4px;padding:1px 6px;font-size:10px;font-family:var(--mono)">${l.taille}</span></span>
            <span onclick="removeLigneVetEnvoi(${i})" style="cursor:pointer;color:#f87171;font-size:14px;padding:2px 6px;border-radius:6px;background:rgba(248,113,113,.1)" title="Supprimer">✕</span>
          </div>`).join('')}
        </div>` : ''}

        <!-- Formulaire ajout d'une ligne -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
          <div><div class="form-field-label">Type vêtement</div>
            <select class="form-inp" id="ef-ligne-type" onchange="STATE.envoiLigneForm.type_vetement=this.value;STATE.envoiLigneForm.taille='';render()">

            <select class="form-inp" id="ef-ligne-taille" onchange="STATE.envoiLigneForm.taille=this.value;render()">
              <option value="">--</option>
              ${taillesPourLigne.map(t=>`<option value="${t}" ${lf.taille===t?'selected':''}>${t}</option>`).join('')}

        </div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <div style="flex:1"><div class="form-field-label">Quantité${lf.type_vetement&&lf.taille?` <span style="color:var(--muted)">(max ${stockLigneVet})</span>`:''}</div>

              ${[...Array(Math.max(stockLigneVet,1)+1).keys()].filter(n=>n>0).map(n=>`<option value="${n}" ${lf.nb_vetements===n?'selected':''}>${n}</option>`).join('')}

          <button onclick="addLigneVetEnvoi()" style="background:#60a5fa;border:none;border-radius:var(--radius-sm);color:#000;font-size:12px;font-weight:800;padding:9px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0">+ Ajouter</button>
        </div>
      </div>

      <!-- TABLETTES + KAKEMONOS + COMPTOIRS + CHARGEURS -->
      <div class="mvt-form-grid" style="margin-bottom:10px">
        <div><div class="form-field-label">Nb kakémonos ${kakDispo>0?`<span style="color:var(--muted)">(max ${kakDispo})</span>`:'<span style="color:#f87171">(0 dispo)</span>'}</div>
          <select class="form-inp" id="ef-nbkak" ${kakDispo===0?'disabled':''}>
            ${[...Array(kakDispo+1).keys()].map(n=>`<option value="${n}" ${ef.nb_kakemonos===n?'selected':''}>${n}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Nb comptoirs ${cptDispo>0?`<span style="color:var(--muted)">(max ${cptDispo})</span>`:'<span style="color:#f87171">(0 dispo)</span>'}</div>
          <select class="form-inp" id="ef-nbcpt" ${cptDispo===0?'disabled':''}>
            ${[...Array(cptDispo+1).keys()].map(n=>`<option value="${n}" ${ef.nb_comptoirs===n?'selected':''}>${n}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">🔌 Chargeurs tablettes</div>
          <select class="form-inp" id="ef-nbchargeurs">
            ${[...Array(21).keys()].map(n=>`<option value="${n}" ${(ef.nb_chargeurs||0)===n?'selected':''}>${n}</option>`).join('')}
          </select></div>
      </div>

      <!-- TABLETTES -->
      <div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div class="form-field-label" style="margin-bottom:0">Tablettes envoyées</div>
          <div style="font-size:10px;font-family:var(--mono);color:${(ef.tablettes_noms||[]).length>0?'#60a5fa':'var(--muted)'}">
            ${(ef.tablettes_noms||[]).length > 0 ? `✓ ${(ef.tablettes_noms||[]).length} sélectionnée(s)` : `${tablettesDispos.length} disponible(s)`}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
          <input list="ef-tabs-datalist" id="ef-tab-input" class="form-inp" placeholder="Rechercher ou saisir un nom…" style="flex:1;font-size:12px" oninput="" onkeydown="if(event.key==='Enter'){event.preventDefault();addTabEnvoiFromInput()}" autocomplete="off">
          <datalist id="ef-tabs-datalist">
            ${tablettesDispos.map(t=>`<option value="${t}">`).join('')}
          </datalist>
          <button onclick="addTabEnvoiFromInput()" style="background:#60a5fa;border:none;border-radius:var(--radius-sm);color:#000;font-size:12px;font-weight:800;padding:8px 12px;cursor:pointer;white-space:nowrap">+ Ajouter</button>
        </div>
        ${tablettesDispos.length === 0 && (ef.tablettes_noms||[]).length === 0 ? `<div style="font-size:11px;color:#f87171;padding:8px;background:rgba(248,113,113,.1);border-radius:6px;text-align:center">Aucune tablette disponible</div>` : ''}
        ${(ef.tablettes_noms||[]).length > 0 ? `
        <div style="display:flex;flex-wrap:wrap;gap:5px;padding:6px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm)">
          ${(ef.tablettes_noms||[]).map(t=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid #60a5fa;background:rgba(59,130,246,.25);color:#60a5fa">
            📱 ${t}
            <span onclick="removeTabEnvoi('${t}')" style="cursor:pointer;font-size:12px;color:#60a5fa;opacity:.7;margin-left:2px" title="Retirer">✕</span>
          </span>`).join('')}
        </div>` : ''}

      <!-- RÉCAP ENVOI -->
      ${(lignesVet.length > 0 || (ef.tablettes_noms||[]).length > 0 || (ef.nb_chargeurs||0) > 0) ? `<div style="background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px">
        <div style="font-weight:800;color:#60a5fa;margin-bottom:4px">📋 Récap envoi</div>
        ${lignesVet.map(l=>`<div style="color:var(--text)">· ${l.nb} × ${l.type} <span style="font-family:var(--mono);background:rgba(255,255,255,.08);padding:0 4px;border-radius:3px">${l.taille}</span></div>`).join('')}
        ${(ef.tablettes_noms||[]).length > 0 ? `<div style="color:var(--text)">· ${(ef.tablettes_noms||[]).length} tablette(s) : ${(ef.tablettes_noms||[]).join(', ')}</div>` : ''}
        ${(ef.nb_chargeurs||0) > 0 ? `<div style="color:var(--text)">· ${ef.nb_chargeurs} chargeur(s) tablette</div>` : ''}
      </div>` : ''}

      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="addEnvoi(${m.id})">✅ Ajouter cet envoi</button>
        <button class="btn btn-ghost" style="flex:1" onclick="STATE.showEnvoiForm[${m.id}]=false;render()">Annuler</button>
      </div>
    </div>`;
  }

  // Checklist display
  let checklistHtml = '';
  if (envois.length > 0) {
    checklistHtml = `<div style="margin-top:10px">
      <div class="card-title" style="margin-bottom:8px">📋 Matériel envoyé (${envois.length} envoi${envois.length>1?'s':''})</div>
      ${envois.map((e,i) => {
        const clKey = `envoi_${i}`;
        const recu = checklist[clKey+'_recu'];
        const rendu = checklist[clKey+'_rendu'];
        const rpKey = `${m.id}_${i}`;
        const rp = STATE.retourPartiel[rpKey] || {};
        const showRP = STATE.showRetourPartiel[rpKey];

        // Calcul du statut de retour partiel
        // Support multi-lignes vêtements ET ancien format single
        const lignesVet = e.lignes_vetements || (e.type_vetement && e.nb_vetements ? [{type:e.type_vetement,taille:e.taille,nb:e.nb_vetements}] : []);
        const totalVet = lignesVet.reduce((a,l)=>a+l.nb,0);
        const totalTab = e.nb_tablettes || 0;
        const totalKak = e.nb_kakemonos || 0;
        const totalCpt = e.nb_comptoirs || 0;
        const totalChg = e.nb_chargeurs || 0;
        const totalItems = totalVet + totalTab + totalKak + totalCpt + totalChg;

        const retTabNoms = rp.tablettes || [];
        const retTab = retTabNoms.length > 0 ? retTabNoms.length : (rendu ? totalTab : 0);
        const retKak = rp.kakemonos !== undefined ? rp.kakemonos : (rendu ? totalKak : 0);
        const retCpt = rp.comptoirs !== undefined ? rp.comptoirs : (rendu ? totalCpt : 0);
        const retChg = rp.chargeurs !== undefined ? rp.chargeurs : (rendu ? totalChg : 0);
        // Calcul retVet : soit via lignes_vetements individuelles, soit ancien champ vetements
        let retVet = 0;
        if (rp.lignes_vetements && rp.lignes_vetements.length > 0) {
          retVet = rp.lignes_vetements.reduce((a, l) => a + (l.rendu || 0), 0);
        } else if (rp.vetements !== undefined) {
          retVet = rp.vetements;
        } else if (rendu) {
          retVet = totalVet;
        }
        const totalRendu = retVet + retTab + retKak + retCpt + retChg;
        const isPartial = totalRendu > 0 && totalRendu < totalItems;
        const isComplet = totalItems > 0 && totalRendu >= totalItems;
        const pct = totalItems > 0 ? Math.round(totalRendu / totalItems * 100) : 0;

        const borderColor = isComplet || rendu ? '#34d399' : isPartial ? '#fbbf24' : '#60a5fa';
        const statusBg = isComplet || rendu ? 'rgba(52,211,153,.08)' : isPartial ? 'rgba(251,191,36,.05)' : 'rgba(59,130,246,.08)';

        // Tablettes dispo pour retour partiel
        const tabsEnvoyees = e.tablettes_noms || [];

        return `<div style="background:${statusBg};border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border:1px solid ${borderColor};transition:all .2s">
          <!-- En-tête envoi -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div>
              <div style="font-size:12px;font-weight:800;color:var(--text)">Envoi ${i+1}</div>
              <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${e.date} · ${totalItems} article${totalItems>1?'s':''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              ${isComplet || rendu
                ? `<span style="font-size:10px;font-weight:800;color:#34d399;background:rgba(52,211,153,.15);padding:2px 8px;border-radius:20px">✓ Rendu complet</span>`
                : isPartial
                  ? `<span style="font-size:10px;font-weight:800;color:#fbbf24;background:rgba(251,191,36,.15);padding:2px 8px;border-radius:20px">⚠ Partiel ${pct}%</span>`
                  : `<span style="font-size:10px;font-weight:800;color:#60a5fa;background:rgba(59,130,246,.15);padding:2px 8px;border-radius:20px">📦 En mission</span>`}
              <button onclick="removeEnvoi(${m.id},${i})" style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:15px;padding:2px 4px" title="Supprimer">🗑</button>
            </div>
          </div>
          <!-- Barre de progression retour -->
          ${totalItems > 0 && totalRendu > 0 ? `<div class="retour-partiel-bar"><div class="retour-partiel-fill" style="width:${pct}%;background:${isComplet||rendu?'#34d399':isPartial?'#fbbf24':'#60a5fa'}"></div></div>` : ''}
          <!-- Détail matériel -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;margin-top:${totalItems > 0 && totalRendu > 0 ? '8px' : '0'}">
            ${totalVet > 0 ? `
            <div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border)">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px">👕 Vêtements</div>
              ${lignesVet.map(l=>{
                const rpLignes = rp.lignes_vetements || [];
                const rpLigne = rpLignes.find(x=>x.type===l.type&&x.taille===l.taille);
                const renduLigne = rpLigne ? rpLigne.rendu : (rendu ? l.nb : 0);
                const manquantLigne = l.nb - renduLigne;
                const hasRetour = STATE.retourPartiel[rpKey] && rp.lignes_vetements;
                return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
                  <span style="font-size:11px;color:var(--muted)">${l.type} <span style="background:var(--surface2);border-radius:3px;padding:0 4px;font-size:9px;font-family:var(--mono)">${l.taille}</span></span>
                  <div style="display:flex;align-items:center;gap:5px">
                    ${hasRetour && manquantLigne > 0 ? `<span style="font-size:9px;font-weight:800;color:#f87171;background:rgba(248,113,113,.15);border-radius:3px;padding:1px 5px">−${manquantLigne}</span>` : ''}
                    <span style="font-size:14px;font-weight:900;color:${hasRetour?(renduLigne===l.nb?'#34d399':renduLigne>0?'#fbbf24':'#f87171'):'var(--text)'};font-family:var(--mono)">${hasRetour?`${renduLigne}/${l.nb}`:l.nb}</span>
                  </div>
                </div>`;
              }).join('')}
              <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px;display:flex;justify-content:space-between">
                <span style="font-size:10px;font-weight:800;color:var(--muted)">TOTAL</span>
                <span style="font-size:14px;font-weight:900;color:#60a5fa;font-family:var(--mono)">${retVet > 0 && retVet < totalVet ? `<span style="color:#fbbf24">${retVet}</span>/${totalVet}` : totalVet}</span>
              </div>
            </div>` : ''}
            ${totalTab ? `
            <div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid rgba(59,130,246,.3);grid-column:span 2">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">📱 Tablettes envoyées</div>
                <div style="font-size:14px;font-weight:900;color:${retTab>0&&retTab<totalTab?'#fbbf24':'#60a5fa'}">${retTab > 0 && retTab < totalTab ? `${retTab}/${totalTab}` : totalTab}</div>
              </div>
              ${e.tablettes_noms&&e.tablettes_noms.length ? `<div style="display:flex;flex-direction:column;gap:3px">${e.tablettes_noms.map(nom=>{
                const isRetourned = retTabNoms.includes(nom);
                return `<div style="display:flex;align-items:center;gap:7px;background:${isRetourned?'rgba(52,211,153,.1)':'rgba(59,130,246,.08)'};border-radius:6px;padding:4px 8px;border:1px solid ${isRetourned?'rgba(52,211,153,.3)':'rgba(59,130,246,.15)'}">
                  <span style="font-size:12px">📱</span>
                  <span style="font-size:12px;font-weight:700;color:${isRetourned?'#34d399':'var(--text)'};font-family:var(--mono)">${nom}</span>
                  ${isRetourned?'<span style="font-size:10px;color:#34d399;margin-left:auto">✓</span>':''}
                </div>`;
              }).join('')}</div>` : `<div style="font-size:10px;color:var(--faint)">Noms non renseignés</div>`}
            </div>` : ''}
            ${totalKak ? `
            <div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border)">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px">🎌 Kakémonos</div>
              <div style="font-size:16px;font-weight:900;color:${retKak>0&&retKak<totalKak?'#fbbf24':'#fbbf24'};line-height:1">${retKak > 0 && retKak < totalKak ? `<span style="color:#fbbf24">${retKak}/${totalKak}</span>` : totalKak}</div>
            </div>` : ''}
            ${totalCpt ? `
            <div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border)">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px">🪑 Comptoirs</div>
              <div style="font-size:16px;font-weight:900;color:${retCpt>0&&retCpt<totalCpt?'#fbbf24':'#c084fc'};line-height:1">${retCpt > 0 && retCpt < totalCpt ? `<span style="color:#fbbf24">${retCpt}/${totalCpt}</span>` : totalCpt}</div>
            </div>` : ''}
            ${(e.nb_chargeurs||0) > 0 ? `
            <div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid rgba(251,191,36,.3)">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px">🔌 Chargeurs</div>
              <div style="font-size:16px;font-weight:900;color:${retChg>0&&retChg<(e.nb_chargeurs||0)?'#fbbf24':'#fbbf24'};line-height:1">${retChg > 0 && retChg < (e.nb_chargeurs||0) ? `<span style="color:#fbbf24">${retChg}/${e.nb_chargeurs}</span>` : e.nb_chargeurs}</div>
            </div>` : ''}
          </div>

          <!-- Bouton retour partiel -->
          ${!rendu && !isComplet ? `<div style="margin-bottom:10px">
            <button onclick="STATE.showRetourPartiel['${rpKey}']=!STATE.showRetourPartiel['${rpKey}'];render()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;width:100%">
              ${showRP ? '✕ Fermer' : '📦 Saisir retour partiel'}
            </button>
          </div>` : ''}

          <!-- Formulaire retour partiel LIGNE PAR LIGNE -->
          ${showRP && !rendu && !isComplet ? `<div style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:10px">
            <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📦 Retour ligne par ligne</div>

            ${lignesVet.length > 0 ? `<div style="margin-bottom:10px">
              <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
                <span>👕 Vêtements</span>
                <span style="font-family:var(--mono);color:#60a5fa">${retVet}/${totalVet} rendu(s)</span>
              </div>
              ${lignesVet.map((l, li) => {
                const rpLignes = (STATE.retourPartiel[rpKey]||{}).lignes_vetements || [];
                const rpLigne = rpLignes.find(x=>x.type===l.type&&x.taille===l.taille) || {type:l.type,taille:l.taille,rendu:rendu?l.nb:0};
                const manquant = l.nb - rpLigne.rendu;
                return `<div class="retour-ligne-row" style="border-color:${rpLigne.rendu===l.nb?'rgba(52,211,153,.4)':rpLigne.rendu>0?'rgba(251,191,36,.4)':'var(--border)'}">
                  <div class="retour-ligne-label">
                    ${l.type} <span class="retour-ligne-taille">${l.taille}</span>
                    ${manquant>0&&rpLigne.rendu>=0&&(STATE.retourPartiel[rpKey])?`<span class="retour-ligne-manquant">−${manquant} manquant${manquant>1?'s':''}</span>`:''}
                  </div>
                  <span class="retour-qty-sent">/ ${l.nb}</span>
                  <button class="retour-qty-btn" onclick="adjustLigneRetour(${m.id},${i},'${l.type}','${l.taille}',${l.nb},-1)">−</button>
                  <span class="retour-qty-val" style="color:${rpLigne.rendu===l.nb?'#34d399':rpLigne.rendu>0?'#fbbf24':'var(--muted)'}">${rpLigne.rendu}</span>
                  <button class="retour-qty-btn" onclick="adjustLigneRetour(${m.id},${i},'${l.type}','${l.taille}',${l.nb},+1)">+</button>
                  <button onclick="setAllLigneRetour(${m.id},${i},'${l.type}','${l.taille}',${l.nb})" style="background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:#34d399;font-size:10px;font-weight:800;padding:4px 8px;cursor:pointer;white-space:nowrap">Tout ✓</button>
                </div>`;
              }).join('')}
            </div>` : ''}

            ${totalTab && tabsEnvoyees.length ? `<div style="margin-bottom:10px">
              <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px">📱 Tablettes (envoyées : ${totalTab}) — cocher celles rentrées</div>
              <div style="display:flex;flex-wrap:wrap;gap:5px">
                ${tabsEnvoyees.map(nom=>`<span onclick="toggleRetourTab(${m.id},${i},'${nom}')" style="cursor:pointer;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid ${retTabNoms.includes(nom)?'#34d399':'var(--border2)'};background:${retTabNoms.includes(nom)?'rgba(52,211,153,.2)':'var(--surface2)'};color:${retTabNoms.includes(nom)?'#34d399':'var(--text)'}">📱 ${nom}</span>`).join('')}
              </div>
            </div>` : ''}

            ${totalKak ? `<div style="margin-bottom:10px">
              <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
                <span>🎌 Kakémonos</span>
                <span style="font-family:var(--mono);color:#fbbf24">${retKak}/${totalKak}</span>
              </div>
              <div class="retour-ligne-row" style="border-color:${retKak===totalKak?'rgba(52,211,153,.4)':retKak>0?'rgba(251,191,36,.4)':'var(--border)'}">
                <div class="retour-ligne-label">Kakémono${totalKak>1?'s':''} ${totalKak-retKak>0&&retKak>=0&&STATE.retourPartiel[rpKey]?`<span class="retour-ligne-manquant">−${totalKak-retKak} manquant${totalKak-retKak>1?'s':''}</span>`:''}
                </div>
                <span class="retour-qty-sent">/ ${totalKak}</span>
                <button class="retour-qty-btn" onclick="adjustKakRetour(${m.id},${i},-1)">−</button>
                  <span class="retour-qty-val" style="color:${retKak===totalKak?'#34d399':retKak>0?'#fbbf24':'var(--muted)'}">${retKak}</span>
                  <button class="retour-qty-btn" onclick="adjustKakRetour(${m.id},${i},+1,${totalKak})">+</button>
                  <button onclick="setRetourPartielKak(${m.id},${i},${totalKak});render()" style="background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:#34d399;font-size:10px;font-weight:800;padding:4px 8px;cursor:pointer;white-space:nowrap">Tout ✓</button>

          const tv2=lgv2.reduce((a,l)=>a+l.nb,0),tt2=e2.nb_tablettes||0,tk2=e2.nb_kakemonos||0,tc2=e2.nb_comptoirs||0,tch2=e2.nb_chargeurs||0;

                const manquants=[];
                lgv2.forEach(l=>{
                  const rpLigne=(rp2.lignes_vetements||[]).find(x=>x.type===l.type&&x.taille===l.taille);
                  const renduLigne=rpLigne?rpLigne.rendu:((m.checklist||{})[`envoi_${i2}_rendu`]?l.nb:0);

                const tt2=e2.nb_tablettes||0,tk2=e2.nb_kakemonos||0,tc2=e2.nb_comptoirs||0,tch2=e2.nb_chargeurs||0;

        const types = [...new Set(vetements.map(s => s.materiel))];
        return types.map(type => {
          const lignes = vetements.filter(s => s.materiel === type);

}

function renderStock() {
  let filtered = STOCK.filter(s => {
    if (STATE.stockFilterAsso !== 'all' && s.asso !== STATE.stockFilterAsso) return false;
    if (STATE.stockFilterStatut === 'zero' && s.qty !== 0) return false;
    if (STATE.stockFilterStatut === 'low' && !(s.qty>0&&s.qty<=3)) return false;
    if (STATE.stockFilterStatut === 'ok' && s.qty < 4) return false;
    if (STATE.stockSearch && !`${s.asso} ${s.materiel} ${s.taille}`.toLowerCase().includes(STATE.stockSearch.toLowerCase())) return false;
    return true;
  });

  const total = STOCK.reduce((a,s)=>a+s.qty,0);
  const ruptures = STOCK.filter(s=>s.qty===0 && isAlertable(s)).length;
  const bas = STOCK.filter(s=>s.qty>0&&s.qty<=3 && isAlertable(s)).length;

  const assoOpts = [...new Set(STOCK.map(s=>s.asso))].sort().map(a=>`<option value="${a}" ${STATE.stockFilterAsso===a?'selected':''}>${a}</option>`).join('');

  const allStockAssos = [...new Set([...STOCK.map(s=>s.asso),...Object.keys(ASSO_COLORS)])].sort();
  const allMaterielTypes = [...new Set(STOCK.map(s=>s.materiel))].sort();
  const addStockHtml = STATE.showAddStock ? `
    <div class="mvt-form" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">➕ Ajouter / réapprovisionner un article</div>

          </select></div>
        <div><div class="form-field-label">Matériel</div>
          <input class="form-inp" id="as-mat" placeholder="T-Shirt, Kway..." list="mat-list" value="${STATE.addStockForm.materiel}" oninput="STATE.addStockForm.materiel=this.value">

        </div>
        <div><div class="form-field-label">Taille</div>
          <select class="form-inp" id="as-taille" onchange="STATE.addStockForm.taille=this.value">
            ${['','XS','S','M','L','XL','XXL','XXXL'].map(t=>`<option value="${t}" ${STATE.addStockForm.taille===t?'selected':''}>${t||'Sans taille'}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Quantité</div>
          <input type="number" class="form-inp" id="as-qty" min="0" value="${STATE.addStockForm.qty}" oninput="STATE.addStockForm.qty=parseInt(this.value)||0"></div>

      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">💡 Si l'article existe déjà, la quantité sera ajoutée au stock existant.</div>
      <div style="display:flex;gap:8px">

        <div class="stock-asso-header" style="background:${c.l};border-color:${c.p}">

          <span class="stock-asso-header-count" style="color:var(--muted)">${info.total} art.</span>
          ${info.alerts>0?`<span class="badge" style="background:#7f1d1d33;color:#f87171;font-size:10px">⚠ ${info.alerts}</span>`:''}
        </div>
        ${items.map(s=>`
          <div class="stock-item-row" style="background:var(--surface)">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="stock-item-name">${s.materiel}</span>
              <span class="stock-item-taille">${s.taille||'–'}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${STATE.editingStockId === s.id
                ? `<input type="number" id="stock-edit-${s.id}" min="0" value="${s.qty}" style="width:54px;background:var(--surface2);border:1px solid #60a5fa;border-radius:6px;padding:3px 6px;color:var(--text);font-size:13px;font-weight:800;font-family:var(--mono)" onkeydown="if(event.key==='Enter')saveStockEdit(${s.id})">
                  <button onclick="saveStockEdit(${s.id})" style="background:#60a5fa;border:none;border-radius:5px;color:#000;font-size:11px;font-weight:800;padding:3px 7px;cursor:pointer">OK</button>
                  <button onclick="STATE.editingStockId=null;render()" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;padding:3px 7px;cursor:pointer">✕</button>`
                : `<span class="stock-qty ${!isAlertable(s)?'stock-ok':s.qty===0?'stock-zero':s.qty<=3?'stock-low':'stock-ok'}" onclick="startEditStock(${s.id},${s.qty})" title="Cliquer pour modifier" style="cursor:pointer">${s.qty}</span>
                  <span class="stock-status ${!isAlertable(s)?'s-ok':s.qty===0?'s-zero':s.qty<=3?'s-low':'s-ok'}">${!isAlertable(s)?'OK':s.qty===0?'Rupture':s.qty<=3?'Bas':'OK'}</span>`}
            </div>
          </div>`).join('')}
      </div>`;
    });
  } else {
    const c = ac(STATE.stockFilterAsso);
    stockHtml = `<div class="stock-asso-block">
      ${filtered.map(s=>`
        <div class="stock-item-row" style="background:var(--surface)">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="stock-item-name">${s.asso} · ${s.materiel}</span>
            <span class="stock-item-taille">${s.taille||'–'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${STATE.editingStockId === s.id
              ? `<input type="number" id="stock-edit-${s.id}" min="0" value="${s.qty}" style="width:54px;background:var(--surface2);border:1px solid #60a5fa;border-radius:6px;padding:3px 6px;color:var(--text);font-size:13px;font-weight:800;font-family:var(--mono)" onkeydown="if(event.key==='Enter')saveStockEdit(${s.id})">
                <button onclick="saveStockEdit(${s.id})" style="background:#60a5fa;border:none;border-radius:5px;color:#000;font-size:11px;font-weight:800;padding:3px 7px;cursor:pointer">OK</button>
                <button onclick="STATE.editingStockId=null;render()" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;padding:3px 7px;cursor:pointer">✕</button>`
              : `<span class="stock-qty ${!isAlertable(s)?'stock-ok':s.qty===0?'stock-zero':s.qty<=3?'stock-low':'stock-ok'}" onclick="startEditStock(${s.id},${s.qty})" title="Cliquer pour modifier" style="cursor:pointer">${s.qty}</span>
                <span class="stock-status ${!isAlertable(s)?'s-ok':s.qty===0?'s-zero':s.qty<=3?'s-low':'s-ok'}">${!isAlertable(s)?'OK':s.qty===0?'Rupture':s.qty<=3?'Bas':'OK'}</span>`}
          </div>
        </div>`).join('')}
    </div>`;
  }


  return `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi-card"><div class="kpi-val" style="font-size:22px">${total}</div><div class="kpi-label">Total articles</div></div>
      <div class="kpi-card"><div class="kpi-val" style="font-size:22px;color:#f87171">${ruptures}</div><div class="kpi-label">Ruptures</div></div>
      <div class="kpi-card"><div class="kpi-val" style="font-size:22px;color:#fbbf24">${bas}</div><div class="kpi-label">Bas stock</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-primary" style="flex:1;padding:12px;border-radius:var(--radius)" onclick="STATE.showAddStock=!STATE.showAddStock;render()">

      <select class="filter-sel" onchange="STATE.stockFilterAsso=this.value;render()">

      </select>
